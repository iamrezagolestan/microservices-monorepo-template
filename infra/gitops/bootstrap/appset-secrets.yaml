# Secrets ApplicationSet (ADR-0004, ADR-0005). One Application per environment,
# each syncing that env's encrypted SopsSecret CR from
# infra/gitops/platform/<env>/secrets/. The base-tier sops-operator (wave 0)
# reconciles the CR into native Secrets that the data + core tiers consume.
#
# Wave 1: after platform-base (operator + SopsSecret CRD up) and before
# platform-data (wave 2), whose Postgres needs the decrypted superuser Secret.
# The local tier delivers the same thing via a single Application (local-secrets)
# because it is a single environment; this is its dev/staging/prod counterpart.
#
# What the template ships vs. what an adopter supplies: the per-env secrets dirs
# ship a README (which documents the SopsSecret shape and the encrypt step) but
# NO encrypted values — a template cannot carry real cluster secrets, and the
# per-cluster age keys in .sops.yaml are placeholders sops cannot encrypt to. Until
# an adopter drops a real platform.enc.yaml into the dir, each Application syncs to
# zero resources (Healthy, empty) and the wave-1 gate closes immediately. The
# wiring is present; only the ciphertext is deferred.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: secrets
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: secrets
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - { env: dev,     server: "https://kubernetes.default.svc" }
          - { env: staging, server: "https://kubernetes.default.svc" }
          - { env: prod,    server: "https://kubernetes.default.svc" }
  template:
    metadata:
      name: "{{ .env }}-secrets"
      labels:
        env: "{{ .env }}"
        app.kubernetes.io/part-of: secrets
    spec:
      project: "{{ .env }}"
      source:
        repoURL: https://github.com/tabmadi/microservices-monorepo-template.git
        targetRevision: master
        path: "infra/gitops/platform/{{ .env }}/secrets"
      destination: { server: "{{ .server }}", namespace: platform }
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true]
        retry:
          limit: 20
          backoff: { duration: 10s, maxDuration: 2m, factor: 2 }
