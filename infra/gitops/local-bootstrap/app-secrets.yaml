# Local secrets delivery (ADR-0005, ADR-0016). Applies the encrypted SopsSecret CR
# (infra/gitops/platform/local/secrets/platform.enc.yaml); the sops-operator (a
# platform chart) reconciles it into native Secrets (postgres-superuser,
# temporal-db-creds, spicedb-creds, kratos-secrets, observability-bucket, *-db).
#
# The operator's own decryption key (sops-age-key) cannot live in git as a usable
# Secret, so cluster:full creates it imperatively before applying the local root-app.
#
# Sync-wave "1": after the base platform tier (wave "0") — which installs the
# sops-operator and registers the SopsSecret CRD — and before the data/core tiers
# (waves "2"/"3") whose charts (postgres, spicedb, ory, observability) CONSUME the
# Secrets this reconciles. Earlier this shared wave "0" with the whole (then
# single) platform ApplicationSet and had to "ride retry/backoff until the CRD is
# Established", because the operator that owns the CRD landed in the same wave. The
# base/data/core split removes that race: the CRD is guaranteed Established (base
# Healthy) before this wave applies the CR, and the Secrets exist before their
# consumers sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-secrets
  namespace: argocd
  labels:
    env: local
    app.kubernetes.io/part-of: secrets
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: local
  source:
    repoURL: https://github.com/tabmadi/microservices-monorepo-template.git
    targetRevision: master
    path: infra/gitops/platform/local/secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
    retry:
      limit: 20
      backoff: { duration: 10s, maxDuration: 2m, factor: 2 }
