# Shared Traefik IngressRoutes (ADR-0009, ADR-0017). Per-service /api/<svc> routes
# are emitted by the service Helm chart (infra/helm/service/templates/ingressroute.yaml)
# on the product apex. These are the cross-cutting OPS-TIER routes.
#
# Trust-tier split (ADR-0017): every operator dashboard lives on its own origin
# `{concept}.ops.<host>`, never on a product path. HostRegexp keeps the manifests
# host-agnostic (env parity, ADR-0016) â€” `^{concept}\.ops\..+` matches
# {concept}.ops.dev.localtest.me locally and {concept}.ops.<apex> in every deployed env.
# The `*.ops.<host>` wildcard cert (secret wildcard-ops-tls) covers all of them.
#
# Each route is behind the ops forward-auth (Oathkeeper validates an AAL2 operator
# session and the per-tool `dashboard:<tool>#view` grant â€” ADR-0010/0017) and the
# identity-header strip + security-headers middlewares.
---
# Hubble UI (ADR-0003) â€” Cilium network-flow visibility (service in kube-system).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ops-hubble
  namespace: platform
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: HostRegexp(`^network\.ops\..+`)
      middlewares:
        - name: strip-identity-headers
        - name: oathkeeper-forward-auth
        - name: security-headers
      services:
        - name: hubble-ui
          namespace: kube-system
          port: 80
  tls:
    secretName: wildcard-ops-tls
---
# Grafana (ADR-0011) â€” served at root (serve_from_sub_path dropped, see chart).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ops-grafana
  namespace: platform
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: HostRegexp(`^o11y\.ops\..+`)
      middlewares:
        - name: strip-identity-headers
        - name: oathkeeper-forward-auth
        - name: security-headers
      services:
        - name: grafana
          port: 80
  tls:
    secretName: wildcard-ops-tls
---
# Lowdefy internal-admin console (ADR-0012). Oathkeeper injects X-User-Email,
# which Lowdefy keys off (see access-rules ops-admin rule).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ops-admin
  namespace: platform
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: HostRegexp(`^admin\.ops\..+`)
      middlewares:
        - name: strip-identity-headers
        - name: oathkeeper-forward-auth
        - name: security-headers
      services:
        - name: lowdefy
          port: 80
  tls:
    secretName: wildcard-ops-tls
---
# Argo CD (ADR-0004). server.insecure is on, so TLS terminates at Traefik and
# argocd-server serves http on :80. Argo is installed into its own `argocd`
# namespace (not `platform`), so the service ref is cross-namespace â€” the same
# pattern as Hubble in kube-system. This needs Traefik allowCrossNamespace, on
# locally via infra/local/traefik-config.yaml; prod's own Traefik must enable it.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ops-argo
  namespace: platform
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: HostRegexp(`^deploy\.ops\..+`)
      middlewares:
        - name: strip-identity-headers
        - name: oathkeeper-forward-auth
        - name: security-headers
      services:
        - name: argocd-server
          namespace: argocd
          port: 80
  tls:
    secretName: wildcard-ops-tls
---
# Temporal Web UI (ADR-0006) â€” temporalio/ui at root on :8080.
