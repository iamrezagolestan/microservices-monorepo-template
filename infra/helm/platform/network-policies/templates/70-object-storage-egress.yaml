{{- if .Values.externalObjectStorage }}
## Prod only: Loki and Tempo push chunks/traces to an off-cluster S3 bucket
## (ADR-0003), so they need egress to the internet on 443. Prometheus keeps a
## local TSDB and needs no bucket egress. Local uses in-cluster MinIO and leaves
## this off — no platform pod reaches the world.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: lgtm-object-storage-egress
spec:
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [loki, tempo]
  egress:
    - toEntities: [world]
      toPorts:
        - ports: [{ port: "443", protocol: TCP }]
{{- end }}
