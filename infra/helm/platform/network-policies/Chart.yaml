apiVersion: v2
name: network-policies
description: |
  Zero-trust CiliumNetworkPolicies for the platform namespace. A namespace-wide
  default-deny (00-baseline) flips every pod to deny-by-default; the remaining
  templates additively allow only the flows observed in Hubble + derived from
  config. The demo app services keep their own k8s NetworkPolicies (service
  chart); these policies cover the platform infrastructure those apps depend on.

  Ingress is the enforcement boundary (who may reach each backend). Egress is
  kept namespace-granular on purpose — intra-platform egress is allowed and the
  per-backend ingress rules gate what actually connects — while all egress OUT of
  the namespace is denied except DNS and the Kubernetes API server.
type: application
version: 0.1.0
appVersion: "1.0.0"
