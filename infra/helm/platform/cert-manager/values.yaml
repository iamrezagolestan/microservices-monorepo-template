cert-manager:
  installCRDs: true
  prometheus: { enabled: false }

# Wildcard host the issued certs cover (e.g. dev.example.com / dev.localtest.me).
# Set per env in infra/gitops/platform/<env>/values.yaml.
envHost: ""

# Local / non-public TLS: when true, issue the wildcard secrets from a SelfSigned
# ClusterIssuer in the platform namespace instead of Let's Encrypt (ADR-0016).
selfSigned:
  enabled: false
