apiVersion: v2
name: pgweb
description: |
  pgweb read-only database inspector (ADR-0012), one more ops-tier origin at
  db.ops.<host>. Single stateless Go binary. Opt-in: renders nothing unless
  pgweb.enabled is set (the local overlay turns it on). Runs with pgweb's own
  --readonly flag — read-only is the documented, break-glass intent.
type: application
version: 0.1.0
appVersion: "0.16.2"
