# Grafana dashboards Application (ADR-0011). Makes dashboards-as-code actually flow
# through GitOps: a Kustomize app that generates the `grafana-dashboards` ConfigMap
# from infra/observability/dashboards/*.json, which the observability Helm chart
# mounts (dashboardsConfigMaps.default). Previously the ConfigMap was materialised
# once at bootstrap and untracked by Argo, so committed dashboard changes never
# reached the cluster — this closes that gap. Picked up by the root app-of-apps,
# which recurses infra/gitops/bootstrap.
#
# Env-agnostic (the same JSON in every env), like the shared gateway/coroot apps,
# so it has no single-env AppProject and stays in `default`.
#
# Sync-wave 2 (the data-tier slot): the ConfigMap must exist BEFORE the core tier
# (wave 3) starts Grafana, which mounts it as a volume. A plain ConfigMap is Healthy
# the moment it applies, so wave 3 is not delayed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dashboards
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/tabmadi/microservices-monorepo-template.git
    targetRevision: master
    path: infra/observability/dashboards
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry:
      limit: 20
      backoff: { duration: 10s, maxDuration: 2m, factor: 2 }
