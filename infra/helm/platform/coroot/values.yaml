# Coroot CE (ADR-0025). The coroot-operator subchart installs the CRD + operator;
# the Coroot CR (templates/coroot.yaml) tells it what to run. Deployed to its own
# `coroot` namespace by infra/gitops/*/app-coroot.yaml.

coroot-operator:
  image:
    # Pin the operator (chart default tracks appVersion, but pin it explicitly so
    # the deployed version is reproducible — toolchain philosophy).
    tag: "1.9.5"

# Component image pins (ADR-0025). CRITICAL: if a component image is unset, the
# operator auto-updates it to the latest tag from ghcr.io/coroot on every reconcile.
# Pinning every one keeps deploys reproducible and lets an air-gapped/enterprise
# adopter mirror an exact set. Bump deliberately.
images:
  coroot: ghcr.io/coroot/coroot:1.23.3
  nodeAgent: ghcr.io/coroot/coroot-node-agent:1.34.2
  clusterAgent: ghcr.io/coroot/coroot-cluster-agent:1.7.1
  clickhouse: ghcr.io/coroot/clickhouse:25.11.2-ubi9-0

# ClickHouse is mandatory (stores traces/logs/profiles, and metrics — see below).
# Kept minimum-viable (template minimalism): a single keeper + single shard/replica,
# no HA ensemble. An enterprise adopter scales shards/replicas/keeper for durability.
#
# ⚠ keeperReplicas is a RAFT ENSEMBLE SIZE — scaling it DOWN on a live cluster is
# destructive. The operator just shrinks the StatefulSet; the surviving keeper keeps
# the old membership in its persisted state and can never win an election
# ("total 1 nodes ... at least 2 nodes should respond"). With no keeper quorum
# ClickHouse's DDLWorker cannot create tables, so Coroot logs "clickhouse tables not
# ready" forever and reports 0 apps while every pod still shows Running.
# Recovering means wiping the keeper + shard PVCs so the ensemble bootstraps clean
# (scale the OPERATOR to 0 first, or it recreates the pods and the PVCs hang
# Terminating). Choose this number at install time; changing it later is a migration.
clickhouse:
  shards: 1
  replicas: 1
  keeperReplicas: 1

# Metrics into the ClickHouse that is already mandatory here, so the operator does
# NOT install a second Prometheus (`storeMetricsInClickhouse` suppresses it).
#
# The platform already runs a Prometheus in `platform` (ADR-0011); a Coroot-owned
# one made two, holding different data, for no benefit. The alternative — pointing
# Coroot at the platform Prometheus via `externalPrometheus` — was rejected: that
# Prometheus is deliberately push-only (`scrape_configs: []`, no ServiceAccount, no
# RBAC) because every metric arrives as an OTLP push from the collector, and Coroot's
# agents expect to be scraped. Bridging would have meant breaking that invariant.
# This drops a whole component instead.
storeMetricsInClickhouse: true

# Retention. Deliberately short: Coroot is the live/triage surface, Loki and Tempo
# are the durable record (bucket-backed, ADR-0003). Keeping Coroot's window narrow
# makes the ADR-0025 boundary structural rather than just documented — if you are
# asking a question older than this, you are in Grafana by construction.
# NOTE Coroot's space manager may retain LESS than these TTLs under disk pressure.
retention:
  logs: 2d
  traces: 2d
  profiles: 2d

# Anonymous Admin. Access is gated at the edge (Oathkeeper AAL2 + OpenFGA
# dashboard:coroot#view — infra/gateway + infra/auth), so Coroot itself runs open
# behind that gate. Coroot CE has no built-in SSO/RBAC (Enterprise-only); the edge
# is the auth boundary, consistent with the other ops dashboards (ADR-0017).
authAnonymousRole: Admin

# SLOs, declared not clicked (ADR-0004). Coroot's UI can define these, but UI state
# lives only in ClickHouse — invisible to git and to Argo, and lost on a namespace
# rebuild. The CR's `projects[].inspectionOverrides` is the declarative path, so
# these are reviewable in a PR like every other dashboard artifact (ADR-0011:
# "UI-only edits are not allowed; changes are PRs").
#
# Objectives are deliberately LOOSE — this is a template exercising the feature
# once (minimalism), not a tuned production SLO. A real project sets real numbers.
# applicationId is "<namespace>:<kind>:<name>" and must match Coroot's own id: the
# servers are `<svc>-server`, not `<svc>`.
slo:
  enabled: true
  project: default
  # Declaring a project makes the CRD require exactly one of apiKeys /
  # memberProjects / remoteCoroot ("Exactly one of ... must be set"), and the agents
  # need a key once the project is operator-managed. `keySecret` is generated by the
  # operator if the Secret is absent, so the key never lands in git as plaintext
  # (ADR-0005) — unlike the sibling `key:` field, which must not be used here.
  apiKeySecret:
    name: coroot-api-key
    key: key
  availability:
    - { applicationId: "platform:Deployment:catalog-server", objectivePercent: 99 }
    - { applicationId: "platform:Deployment:orders-server", objectivePercent: 99 }
    - { applicationId: "platform:Deployment:payment-server", objectivePercent: 99 }
  latency:
    - { applicationId: "platform:Deployment:catalog-server", objectivePercent: 99, objectiveThreshold: "500ms" }
    - { applicationId: "platform:Deployment:orders-server", objectivePercent: 99, objectiveThreshold: "1s" }
    - { applicationId: "platform:Deployment:payment-server", objectivePercent: 99, objectiveThreshold: "1s" }
