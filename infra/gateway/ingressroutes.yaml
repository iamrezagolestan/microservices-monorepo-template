# Headlamp — k8s debug UI (ADR-0024, ADR-0017). Core: the backend Service exists
# in every env; if a project sets headlamp.enabled=false the route resolves to no
# endpoints.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ops-k8s
  namespace: platform
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
