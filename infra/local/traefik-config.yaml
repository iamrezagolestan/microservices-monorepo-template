# k3s-bundled Traefik tuning for local `cluster:full` (ADR-0009). The bundled
# Traefik disables cross-namespace IngressRoute references by default; platform
# routes need them to target the Coroot service in the `coroot` namespace and
# Argo CD in `argocd` (infra/gateway/ingressroutes.yaml). Prod runs its own Traefik (the ansible
# k3s_server role disables the bundled one), so this is strictly local and lives
# under infra/local/.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  failurePolicy: reinstall
  valuesContent: |-
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
