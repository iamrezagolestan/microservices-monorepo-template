## Namespace-wide default-deny + the egress every pod legitimately needs.
## `enableDefaultDeny` (Cilium 1.14+) flips every platform pod to deny-by-default
## for both directions; all allows — here, in the sibling templates, and in the
## service chart's own NetworkPolicies — are additive on top.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: platform-baseline
spec:
  endpointSelector: {}
  enableDefaultDeny:
    ingress: true
    egress: true
  # No ingress allows here — each backend grants its own callers in the sibling
  # templates; the demo app services grant theirs via the service chart.
  egress:
    # CoreDNS — every pod resolves service names.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
    # Intra-namespace: allow reaching other platform pods. The destination's
    # ingress rules decide what actually connects — egress is not the gate here.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
    # Kubernetes API server — operators (cert-manager, CNPG, sops), the OTel
    # collector and the CNPG instance manager watch/patch resources.
    #
    # `host` + `remote-node` are required alongside `kube-apiserver`: when the API
    # server runs ON a cluster node (single-node k3d locally, or any node-hosted
    # apiserver), Cilium classifies its address as the `host`/`remote-node` reserved
    # identity, which takes precedence over `kube-apiserver`. With only
    # `kube-apiserver` here, every pod→API SYN to the node IP is dropped as
    # "Policy denied", so operators can never reconcile and the platform never
    # converges. This is host-to-apiserver reachability, not a security loosening —
    # pods still cannot reach arbitrary node ports (no ingress is granted on hosts).
    - toEntities:
        - kube-apiserver
        - host
        - remote-node
