openapi: 3.1.0
info: { title: orgs, version: 0.1.0, description: Organization and membership service., x-audience: public }
servers: [{ url: /api }]   # flat resource namespace (ADR-0017); paths are globally unique
# `x-admin: crud` marks the resource group the admin generator (ADR-0012, tools/admin-gen)
# scaffolds list/detail/create/edit pages for, from the operations present below.
tags: [{ name: orgs, x-admin: crud }, { name: cluster }]
paths:
  /orgs:
    get:
      operationId: listOrgs
      # Listing every org is a back-office view, kept out of public docs (ADR-0008).
      x-audience: internal
      description: List all organizations.
      tags: [orgs]
      responses:
        "200": { description: The organization list, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Org" } } } } }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createOrg
      description: Create an organization.
      tags: [orgs]
      requestBody:
        required: true
        description: The organization to create.
        content: { application/json: { schema: { $ref: "#/components/schemas/OrgInput" } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Org" } } } }
        default: { $ref: "#/components/responses/Error" }
  /orgs/{id}:
    get:
      operationId: getOrg
      description: Fetch an organization by id.
      tags: [orgs]
      parameters: [{ name: id, in: path, required: true, description: Organization id., schema: { type: string, format: uuid } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Org" } } } }
        default: { $ref: "#/components/responses/Error" }
    put:
      operationId: updateOrg
      x-audience: internal
      description: Rename an organization.
      tags: [orgs]
      parameters: [{ name: id, in: path, required: true, description: Id of the organization to update., schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        description: The new organization fields.
        content: { application/json: { schema: { $ref: "#/components/schemas/OrgInput" } } }
      responses:
        "200": { description: The updated organization, content: { application/json: { schema: { $ref: "#/components/schemas/Org" } } } }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteOrg
      x-audience: internal
      description: Delete an organization.
      tags: [orgs]
      parameters: [{ name: id, in: path, required: true, description: Id of the organization to delete., schema: { type: string, format: uuid } }]
      responses:
        "204": { description: Deleted }
        default: { $ref: "#/components/responses/Error" }
  /identity-created:
    post:
      operationId: onIdentityCreated
      # East-west webhook (Kratos → orgs, in-cluster): bypasses the edge, gated by
      # NetworkPolicy. `x-audience: cluster` keeps it off both docs portals (ADR-0008).
      x-audience: cluster
      tags: [cluster]
      description: Kratos post-registration webhook. Creates a personal org for the new identity.
      requestBody:
        required: true
        description: The newly created identity.
        content:
          application/json:
            schema:
              type: object
              description: Kratos identity-created payload.
              properties:
                identity_id: { type: string }
                email:       { type: string }
      responses:
        "204": { description: Ack }
        default: { $ref: "#/components/responses/Error" }
components:
  responses:
    Error:
      description: Error response
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
  schemas:
    Problem:
      type: object
      description: RFC 7807 problem document.
      required: [code, message]
      properties:
        code:    { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }
    Org:
      type: object
      description: An organization.
      required: [id, name]
      properties:
        id:   { type: string, format: uuid }
        name: { type: string }
    OrgInput:
      type: object
      description: Request body to create an organization.
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
