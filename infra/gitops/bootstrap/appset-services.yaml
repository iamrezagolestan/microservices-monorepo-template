# Services ApplicationSet (ADR-0004). Git-directory generator over per-env
# values files; one Application per service per environment, auto-onboarded
# when its values file lands in master.
#
# sync-wave "10" holds this back until the platform ApplicationSet (wave "0",
# gated by a custom health check — see infra/helm/platform/argocd/values.yaml)
# and the gateway Application (wave "5") are both Synced+Healthy. Services
# depend on both: platform for Postgres/Temporal/SpiceDB/CoreDNS-affecting
# CNI stability, gateway for the Traefik middlewares their IngressRoutes
# reference.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: services
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: services
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - list:
              elements:
                # Sync windows (e.g. staging's 05:00 UTC gate) live on the
                # per-env AppProject, not here — see bootstrap/appproject.yaml.
                - { env: dev,     server: "https://kubernetes.default.svc" }
                - { env: staging, server: "https://kubernetes.default.svc" }
                - { env: prod,    server: "https://kubernetes.default.svc" }
          - git:
              repoURL: https://github.com/tabmadi/microservices-monorepo-template.git
              revision: master
              files:
                - { path: "infra/gitops/services/{{ .env }}/values/*.yaml" }
  template:
    metadata:
      name: "{{ .env }}-service-{{ .path.filenameNormalized }}"
      labels:
        env: "{{ .env }}"
        app.kubernetes.io/part-of: services
        app.kubernetes.io/component: "{{ .path.filenameNormalized }}"
    spec:
      project: "{{ .env }}"
      source:
        repoURL: https://github.com/tabmadi/microservices-monorepo-template.git
        targetRevision: master
        path: infra/helm/service
        helm:
          valueFiles:
            - "../../gitops/services/{{ .env }}/values/{{ .path.filename }}"
      destination: { server: "{{ .server }}", namespace: platform }
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true, ServerSideApply=true]
