# Full-tier service deltas (ADR-0016), layered over local-service.yaml by the
# Skaffold `full` profile (activated by scripts/cluster-full.sh).
#
# The inner loop (`cluster:up`) calls services directly and skips telemetry, so
# local-service.yaml turns ingress off and nulls the OTel endpoint. `cluster:full`
# runs the SAME edge + OTel collector production does, so flip both back on: each
# service is exposed under /api/<name>/ through Traefik (behind Oathkeeper), and
# ships traces/metrics/logs to the in-cluster collector. Only the knobs that differ
# from the inner loop live here; everything else is inherited from local-service.yaml.
ingress:
  enabled: true
  host: dev.localtest.me

# Run DB migrations on deploy (the inner loop applies them via `mise run db:migrate`
# against its lightweight Postgres; the full tier owns the real CNPG databases).
migrations:
  enabled: true

otel:
  # The collector's ClusterIP service exposes otlp/grpc on 4317 (chart default
  # endpoint); the inner-loop overlay blanks it.
  endpoint: "http://otel-collector.platform.svc.cluster.local:4317"

env:
  # Re-enable the OTel SDK (local-service.yaml disables it for the collector-less
  # inner loop).
  OTEL_SDK_DISABLED: "false"
