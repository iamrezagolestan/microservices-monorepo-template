---
# Headlamp â€” k8s debug UI (ADR-0024, ADR-0017). Opt-in: the backend Service only
# exists when infra/helm/platform/headlamp is enabled (local overlay); until then
# the route resolves to no endpoints.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
