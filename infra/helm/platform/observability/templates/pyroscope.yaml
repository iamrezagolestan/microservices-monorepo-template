# Pyroscope (ADR-0025 POC — continuous profiling). Single-binary monolith
# (-target=all), filesystem storage on an emptyDir (POC; a real deployment uses the
# off-cluster bucket like Loki/Tempo). Profiles are PUSHED here by the Alloy agent
# (templates/alloy.yaml); Grafana queries it as the Pyroscope datasource. Ingress is
# granted by the pyroscope CiliumNetworkPolicy in the network-policies chart.
{{- $py := .Values.pyroscope }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: pyroscope
  labels: { app.kubernetes.io/name: pyroscope, app.kubernetes.io/part-of: observability }
data:
  config.yaml: |
    server:
      http_listen_port: 4040
    # Local profile store. emptyDir at /data (POC); swap for a bucket to persist.
    pyroscopedb:
      data_path: /data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  labels: { app.kubernetes.io/name: pyroscope, app.kubernetes.io/part-of: observability }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: pyroscope }
  template:
    metadata:
      labels: { app.kubernetes.io/name: pyroscope }
    spec:
      containers:
        - name: pyroscope
          image: {{ $py.image }}
          args: ["-config.file=/etc/pyroscope/config.yaml"]
          ports:
            - { name: http, containerPort: 4040 }
          readinessProbe: { httpGet: { path: /ready, port: http }, initialDelaySeconds: 15 }
          livenessProbe:  { httpGet: { path: /ready, port: http }, initialDelaySeconds: 30, periodSeconds: 30 }
          resources: {{- toYaml $py.resources | nindent 12 }}
          volumeMounts:
            - { name: config, mountPath: /etc/pyroscope }
            - { name: data,   mountPath: /data }
      volumes:
        - name: config
          configMap: { name: pyroscope }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pyroscope
  labels: { app.kubernetes.io/name: pyroscope, app.kubernetes.io/part-of: observability }
spec:
  selector: { app.kubernetes.io/name: pyroscope }
  ports:
    - { name: http, port: 4040, targetPort: http }
