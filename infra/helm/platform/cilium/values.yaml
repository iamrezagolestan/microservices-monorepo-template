cilium:
  # k3s runs its own API server on localhost:6443.
  kubeProxyReplacement: true
  k8sServiceHost: 127.0.0.1
  k8sServicePort: 6443

  ipam:
    mode: kubernetes

  # WireGuard transparent encryption for all east-west pod traffic (ADR-0003).
  # A config flag, not a sidecar: multi-tenant PII and audit posture do not ship
  # plaintext east-west. Node-to-node only; host-level traffic is out of scope.
  encryption:
    enabled: true
    type: wireguard

  # Hubble gives per-flow network visibility without a sidecar (ADR-0003). It is
  # the audit surface for internal header-trust (ADR-0009). The UI is deployed
  # and exposed auth-gated at the hubble.<host> subdomain via the gateway
  # IngressRoute (infra/gateway).
  hubble:
    enabled: true
    relay:
      enabled: true
    ui:
      enabled: true
      # Served at the ROOT of the `hubble.<host>` subdomain (gateway IngressRoute
      # matches HostRegexp `^hubble\.`), not under a path prefix. hubble-ui's
      # React Router is hardwired to basename `/` and never reads the `<base>`
      # tag for routing, so a `/hubble` sub-path breaks client routing (404 on
      # every route). Root-on-a-subdomain is the only layout it supports, so keep
      # baseUrl at `/`.
      baseUrl: /
