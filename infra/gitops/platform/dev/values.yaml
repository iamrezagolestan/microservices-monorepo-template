# Per-env platform overrides (ADR-0004).
# Top-level `cluster:` — the postgres chart's own values schema has no
# `postgres:` namespace wrapper (unlike the dependency subcharts below).
cluster:
  instances: 3
  storage: { size: 50Gi }
  backup:
    retentionPolicy: "7d"
    s3: { endpointURL: "http://minio.platform.svc.cluster.local:9000", destinationPath: "s3://platform-backups/postgres" }

# Non-prod object storage is in-cluster MinIO, not an off-cluster bucket
# (ADR-0016). Override each backend's S3 endpoint; prod keeps the chart
# defaults (the off-cluster bucket) and disables this chart entirely.
loki:
  loki:
    storage:
      s3:
        endpoint: minio.platform.svc.cluster.local:9000
        s3ForcePathStyle: true
        insecure: true
tempo:
  tempo:
    storage:
      trace:
        s3:
          endpoint: minio.platform.svc.cluster.local:9000
          insecure: true

# Lowdefy admin console (ADR-0012): the one repo-built platform image. Pulled from
# ghcr and promoted by git SHA on merge (promote-on-merge), exactly like the Go
# services and the frontend. Local uses the k3d registry (platform/local/values.yaml).
lowdefy:
  image:
    repository: ghcr.io/tabmadi/microservices-monorepo-template/admin
    tag: "0000000000000000000000000000000000000000"   # bumped by promote-on-merge
