# The Coroot CR the operator reconciles into the running stack (server + node-agent
# DaemonSet + cluster-agent + ClickHouse + Prometheus). sync-wave "1" so it applies
# AFTER the operator + CRD (wave 0) are Healthy — otherwise the first ArgoCD sync
# races the CRD registration (retry would eventually catch it, but the wave is clean).
apiVersion: coroot.com/v1
kind: Coroot
metadata:
  name: coroot
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  communityEdition:
    image:
      name: {{ .Values.images.coroot }}
  # Gated at the edge (ADR-0017); Coroot CE has no SSO/RBAC of its own.
  authAnonymousRole: {{ .Values.authAnonymousRole }}
  nodeAgent:
    image:
      name: {{ .Values.images.nodeAgent }}
  clusterAgent:
    image:
      name: {{ .Values.images.clusterAgent }}
  clickhouse:
    shards: {{ .Values.clickhouse.shards }}
    replicas: {{ .Values.clickhouse.replicas }}
    keeper:
      replicas: {{ .Values.clickhouse.keeperReplicas }}
    image:
      name: {{ .Values.images.clickhouse }}
  # No `prometheus:` block — storeMetricsInClickhouse suppresses that Deployment
  # entirely (see values.yaml for why we don't bridge to the platform Prometheus).
  storeMetricsInClickhouse: {{ .Values.storeMetricsInClickhouse }}
  logsTTL: {{ .Values.retention.logs }}
  tracesTTL: {{ .Values.retention.traces }}
  profilesTTL: {{ .Values.retention.profiles }}
{{- if .Values.slo.enabled }}
  # Declarative SLOs. The operator reconciles this project, so objectives are
  # git-managed rather than clicked into the UI (see values.yaml).
  projects:
    - name: {{ .Values.slo.project }}
      apiKeys:
        - description: coroot agents
          keySecret:
            name: {{ .Values.slo.apiKeySecret.name }}
            key: {{ .Values.slo.apiKeySecret.key }}
      inspectionOverrides:
        sloAvailability: {{- toYaml .Values.slo.availability | nindent 10 }}
        sloLatency: {{- toYaml .Values.slo.latency | nindent 10 }}
{{- end }}
