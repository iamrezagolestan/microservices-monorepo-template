# OpenAPI 3.1 lint ruleset for all services (ADR-0008). Spectral-format ruleset,
# run by vacuum (`mise run lint:openapi`). `spectral:oas` is the built-in core ruleset.
extends:
  - "spectral:oas"

rules:
  # Style
  # Specs are codegen contracts (ogen), not docs — per-property examples add
  # maintenance burden to every scaffolded spec for no codegen value. Off.
  oas3-missing-example: off
  operation-operationId: error
  operation-tag-defined: error
  oas3-server-not-example.com: warn
  info-contact: off
  info-license: off

  # Breaking-change hygiene — every operation must declare its security and a 2xx + 4xx response.
  operation-success-response: error

  # Naming conventions
  operation-operationId-valid-in-url:
    description: operationId must be camelCase, ASCII, no spaces
    given: $.paths.*[get,post,put,patch,delete].operationId
    severity: error
    then:
      function: pattern
      functionOptions:
        match: "^[a-z][a-zA-Z0-9]+$"

  # Enforce snake_case property names (this project's wire-format convention).
  # Disable the built-in camelCase rule and replace it with the snake_case
  # variant of the same function, so non-snake_case names still warn.
  camel-case-properties: off
  snake-case-properties:
    description: schema property names must be snake_case
    given: "$"
    resolved: true
    severity: warn
    then:
      function: oasCamelCaseProperties
      functionOptions:
        type: snake

  # Every path must have a tag for grouping
  must-have-tag:
    description: every operation must have at least one tag
    given: $.paths.*[get,post,put,patch,delete]
    severity: error
    then:
      field: tags
      function: truthy

  # admin-gen markers (ADR-0012). The generator reads two `x-admin` markers: `crud`
  # on a tag (the resource group) and `action` on an operation. A value in the wrong
  # place — `crud` on an operation, or `action`/typo on a tag — is silently ignored
  # (no admin page), so pin each to its valid value.
  x-admin-operation-value:
    description: "operation-level x-admin must be `action` (resource CRUD is marked with x-admin: crud on the tag)"
    given: $.paths.*[*]['x-admin']
    severity: error
    then:
      function: enumeration
      functionOptions:
        values:
          - action
  x-admin-tag-value:
    description: "tag-level x-admin must be `crud` (per-operation actions use x-admin: action on the operation)"
    given: $.tags[*]['x-admin']
    severity: error
    then:
      function: enumeration
      functionOptions:
        values:
          - crud
