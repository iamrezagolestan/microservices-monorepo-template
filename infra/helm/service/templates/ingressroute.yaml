{{- if .Values.ingress.enabled }}
{{- if .Values.ingress.resources }}
# Flat-API routing (ADR-0017): the edge routes each /api/<resource> the service
# owns and strips the shared /api prefix, so the service mounts its resources at
# root (e.g. /products) and the service topology stays hidden from the URL.
# Applied AFTER oathkeeper-forward-auth so Oathkeeper still matches on /api/.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "service.fullname" . }}-stripprefix
  labels: {{- include "service.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /api
---
{{- end }}
# Traefik IngressRoute (ADR-0003, ADR-0009, ADR-0017). Traefik fronts the edge:
# /api/<resource> traffic passes through the Oathkeeper ForwardAuth middleware,
# which validates the Kratos session / Hydra JWT and injects the trusted identity
# headers the service reads. Static browser-security headers are stamped on every
# response. Which service owns a resource is a routing detail here, not a URL: a
# resource can move between services without a URL change (CI lints that no two
# x-audience specs claim the same resource — ADR-0008).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "service.fullname" . }}
  labels: {{- include "service.labels" . | nindent 4 }}
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: {{ include "service.ingressMatch" . }}
      middlewares:
        # Anti-spoofing (ADR-0009): strip any client-supplied identity headers
        # BEFORE forwardAuth, so a client cannot inject X-User-* on an anonymous
        # /api route (Oathkeeper re-adds the authoritative values).
        - name: strip-identity-headers
          namespace: platform
        - name: oathkeeper-forward-auth
          namespace: platform
        - name: security-headers
          namespace: platform
{{- if .Values.ingress.resources }}
        - name: {{ include "service.fullname" . }}-stripprefix
{{- end }}
      services:
        - name: {{ include "service.fullname" . }}-server
          port: 80
  tls:
    secretName: wildcard-tls
{{- end }}
