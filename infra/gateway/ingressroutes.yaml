    secretName: wildcard-ops-tls
---
# Lowdefy internal-admin console (ADR-0012). Oathkeeper injects X-User-Email,
# which Lowdefy keys off (see access-rules ops-lowdefy rule).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ops-lowdefy
  namespace: platform
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: HostRegexp(`^lowdefy\.ops\..+`)
      middlewares:
        - name: strip-identity-headers
        - name: oathkeeper-forward-auth
        - name: security-headers
      services:
        - name: lowdefy
          port: 80
  tls:
    secretName: wildcard-ops-tls
---
# Argo CD (ADR-0004). server.insecure is on, so TLS terminates at Traefik and
# argocd-server serves http on :80. Argo is installed into its own `argocd`
# namespace (not `platform`), so the service ref is cross-namespace — the same
# pattern as Hubble UI in kube-system. This needs Traefik allowCrossNamespace, on
# locally via infra/local/traefik-config.yaml; prod's own Traefik must enable it.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ops-argocd
  namespace: platform
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: HostRegexp(`^argocd\.ops\..+`)
      middlewares:
        - name: strip-identity-headers
        - name: oathkeeper-forward-auth
        - name: security-headers
      services:
        - name: argocd-server
          namespace: argocd
          port: 80
  tls:
    secretName: wildcard-ops-tls
---
