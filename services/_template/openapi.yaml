openapi: 3.1.0
info:
  title: Template service
  version: 0.1.0
  # Documentation audience (ADR-0008). Fail-closed default: `internal`. If the new
  # service is edge-exposed (ingress.enabled / ingress.resources), it MUST declare
  # `x-audience: public` — an edge-exposed spec may not read `internal`.
  x-audience: internal
  description: |
    Skeleton OpenAPI spec. Copy this file when scaffolding a new service
    (see scripts/new-service.sh) and replace `_template` with the new name.
servers:
  # Flat resource namespace (ADR-0017): the server prefix is the shared /api, and
  # paths are globally-unique resource nouns — replace /items with this service's
  # own resource(s). No two services may own the same top-level resource (CI-linted).
  - url: /api
tags:
  - name: items
paths:
  /items:
    get:
      operationId: listItems
      description: List all items.
      tags: [items]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Item" }
        "default":
          $ref: "#/components/responses/Error"
    post:
      operationId: createItem
      description: Create an item.
      tags: [items]
      requestBody:
        required: true
        description: The item to create.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ItemInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
        "default":
          $ref: "#/components/responses/Error"

components:
  responses:
    Error:
      description: Error response
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
  schemas:
    Problem:
      type: object
      description: RFC 7807 problem document.
      required: [code, message]
      properties:
        code:    { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }
    Item:
      type: object
      description: A template item.
      required: [id, name]
      properties:
        id:   { type: string, format: uuid }
        name: { type: string, minLength: 1 }
    ItemInput:
      type: object
      description: Request body to create an item.
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
