# CNPG operator defaults. The Cluster CR for the shared instance is rendered
# from templates/cluster.yaml; per-database tenancy is configured per-service.
cloudnative-pg:
  fullnameOverride: cnpg-operator
  monitoring:
    # No Prometheus Operator on this platform — metrics flow through the OTel
    # Collector into Prometheus (ADR-0011), and the PodMonitor CRD
    # (monitoring.coreos.com/v1) the operator would install is absent, so a
    # PodMonitor here would reference a CRD that does not exist.
    podMonitorEnabled: false

cluster:
  name: postgres
  # Render the Cluster/Pooler CRs. The helm-direct local bring-up sets this false
  # for a first pass (operator + CRDs only) so the CRs don't race CRD registration;
  # the GitOps path leaves it true and orders via sync-waves.
  create: true
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  storage:
    size: 20Gi
    storageClass: ""    # defaults to k3s local-path (ADR-0003)
  # CNPG provisions one app database (`database`/`owner`) per Cluster; the
  # platform needs one per service plus kratos/temporal/openfga, so the rest
  # are created via postInitApplicationSQL, owned by the same app role.
  initdb:
    database: orders
    owner: dev
    secretName: postgres-superuser
    postInitApplicationSQL:
      - "CREATE DATABASE catalog OWNER dev"
      - "CREATE DATABASE orgs OWNER dev"
      - "CREATE DATABASE payment OWNER dev"
      - "CREATE DATABASE kratos OWNER dev"
      - "CREATE DATABASE temporal OWNER dev"
      - "CREATE DATABASE temporal_visibility OWNER dev"
      - "CREATE DATABASE openfga OWNER dev"
  pooler:
    instances: 2
    poolMode: transaction      # ADR-0007: transaction mode is the default
    maxClientConn: 1000
    defaultPoolSize: 25
  backup:
    enabled: true
    s3:
      destinationPath: "s3://platform-backups/postgres"
      endpointURL: ""          # set per env
      retentionPolicy: "30d"   # 7d in non-prod, see per-env values
