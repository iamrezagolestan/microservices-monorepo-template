name: catalog
image:
  repository: ghcr.io/tabmadi/microservices-monorepo-template/catalog-server
  tag: "0000000000000000000000000000000000000000"   # bumped by promote-on-merge
worker:
  enabled: false
server:
  replicas: 1
ingress:
  enabled: true
  host: dev.example.com
  resources: [products]
# The Lowdefy admin console (apps/admin) calls catalog server-side, east-west on
# the server port, bypassing the /api edge (ADR-0012). allowFromGateway only
# covers Traefik → /api/products, so the console must be allowed explicitly.
networkPolicy: { allowFrom: [lowdefy] }
secrets:
  envFrom: [catalog-db-creds, spicedb-creds]
env:
  DATABASE_URL_SECRET_REF: catalog-db-creds
  # Write authz (ADR-0010): dial SpiceDB via the shared Checker. Blank preshared key
  # falls back to spicedb-creds.preshared_key (envFrom), as the authz service does.
  SPICEDB_ENDPOINT: "spicedb.platform.svc.cluster.local:50051"
  SPICEDB_PRESHARED_KEY: ""
