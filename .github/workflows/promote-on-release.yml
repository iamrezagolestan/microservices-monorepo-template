# Tag-driven prod promotion (ADR-0004, ADR-0013). Triggered by a repo-wide CalVer
# release tag (vYYYY.0M.MICRO) cut by `mise run release`. A release pins EVERY
# prod service/app to the release commit — by digest, the strongest immutable
# identity — labels the images with the CalVer, opens the prod-bump PR, and (once
# merged + synced) gates on the rollout completing.
name: promote-on-release

on:
  push:
    tags: ["v[0-9][0-9][0-9][0-9].[0-9][0-9].*"]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  promote:
    if: ${{ !github.event.repository.is_template }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: jdx/mise-action@v2
        with: { install: true, cache: true }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release
        id: rel
        run: |
          ver="${GITHUB_REF#refs/tags/}"            # vYYYY.0M.MICRO
          sha="$(git rev-parse "${GITHUB_REF}^{}")" # commit the tag points to
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Pin prod to digests + label images with the CalVer
        env:
          REPO: ghcr.io/${{ github.repository }}
          SHA: ${{ steps.rel.outputs.sha }}
          VER: ${{ steps.rel.outputs.version }}
        run: |
          set -euo pipefail
          # A repo-wide release pins every prod values file to THIS commit, by
          # digest (`repo@sha256:…`) — an image digest cannot be re-pushed, so a
          # pod cannot silently run different code under the same reference
          # (ADR-0013). The CalVer is added as a human-facing label on the image.
          # image.repository is read straight from each values file, so this works
          # for both `-server`/`-worker` services and apps (frontend has no suffix).
          shopt -s nullglob
          pin() {  # <values-file> <yaml-path-to-image-block>
            local path="$1" block="$2" repo digest
            repo="$(yq "${block}.repository // \"\"" "$path")"
            [ -n "$repo" ] || return 0
            digest="$(docker buildx imagetools inspect "${repo}:${SHA}" --format '{{.Manifest.Digest}}')"
            yq -i "${block}.digest = \"${digest}\" | ${block}.tag = \"${SHA}\"" "$path"
            docker buildx imagetools create -t "${repo}:${VER}" "${repo}:${SHA}"  # CalVer label
          }
          for path in infra/gitops/services/prod/values/*.yaml; do
            pin "$path" ".image"
            pin "$path" ".worker.image"
          done
          # The admin console is the one repo-built platform image (lowdefy chart,
          # ADR-0012); pin it by digest the same way, at its platform overlay path.
          pin "infra/gitops/platform/prod/values.yaml" ".lowdefy.image"

      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(deploy): promote ${{ steps.rel.outputs.version }} to prod"
          title: "chore(deploy): ${{ steps.rel.outputs.version }} → prod"
          branch: deploy/prod-${{ steps.rel.outputs.version }}
          delete-branch: true
          labels: auto-merge

      # Rollout gate (ADR-0004, ADR-0013): "Argo Healthy" already means the new
      # ReplicaSet is available, but a release must not report success until prod
      # has actually converged on the release commit. Runs post-merge against the
      # prod cluster; scaffolded here (template CI has no prod kubeconfig, like any
      # cluster-touching step) — wire ARGOCD_SERVER/ARGOCD_AUTH_TOKEN to enable:
      #   argocd app wait -l env=prod --revision "${SHA}" --sync --health --timeout 600
      - name: Verify prod rollout
        env:
          SHA: ${{ steps.rel.outputs.sha }}
        run: |
          echo "Would wait for prod to converge on ${SHA}:"
          echo "  argocd app wait -l env=prod --revision \"${SHA}\" --sync --health --timeout 600"

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.rel.outputs.version }}
          generate_release_notes: true
