# MinIO is non-prod only (ADR-0016); gate the whole chart off here, the same
# values-only way every other per-env delta is expressed.
minio:
  enabled: false

# Top-level `cluster:` — the postgres chart's own values schema has no
# `postgres:` namespace wrapper (unlike the dependency subcharts below).
cluster:
  instances: 3
  storage: { size: 200Gi }
  backup:
    retentionPolicy: "30d"
    s3: { destinationPath: "s3://platform-prod-backups/postgres" }

# Observability backends run 2 replicas in prod for availability (ADR-0011);
# dev/staging keep the single-replica chart defaults.
loki:
  singleBinary: { replicas: 2 }
tempo:
  replicas: 2
grafana:
  replicas: 2

# Lowdefy admin console (ADR-0012): the one repo-built platform image. Pinned to
# the release commit by digest on a CalVer release (promote-on-release), the same
# immutable-identity guarantee every prod service gets.
lowdefy:
  image:
    repository: ghcr.io/tabmadi/microservices-monorepo-template/admin
    tag: "0000000000000000000000000000000000000000"   # pinned + digested by promote-on-release
