# Dashboards-as-code (ADR-0011). This kustomization turns the committed dashboard
# JSON in this directory into the `grafana-dashboards` ConfigMap the Grafana chart
# mounts (observability values: dashboardsConfigMaps.default). It is synced by the
# grafana-dashboards ArgoCD Application (infra/gitops/{bootstrap,local-bootstrap}/
# app-grafana-dashboards.yaml), so a PR that adds or edits a *.json here reaches the
# cluster on the next Argo pass — no manual `kubectl create configmap` step, which
# is what previously left new dashboards invisible (they were materialised once at
# bootstrap and untracked by Argo).
#
# disableNameSuffixHash: the chart references the ConfigMap by the STABLE name
# `grafana-dashboards`; kustomize's default content-hash suffix would rename it on
# every edit and break that reference.
#
# Files are listed explicitly (kustomize's configMapGenerator does not glob
# portably across versions). ADD A LINE HERE when you add a new dashboard JSON —
# that PR is what publishes it, keeping dashboards-as-code honest end to end.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: platform
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: grafana-dashboards
    files:
      - hubble-drops.json
      - applications.json
      - service-red.json
      - service-map.json
      - hubble-map.json
      - service-detail.json
