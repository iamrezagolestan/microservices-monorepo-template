# The Temporal subchart names its frontend service `<release>-frontend`, but the
# service contract is TEMPORAL_HOST_PORT=temporal:7233 (ADR-0016 — the same name
# the inner-loop `deps.yaml` stand-in uses). Expose the bare `temporal` name as an
# alias so that contract resolves in every env that runs this chart.
apiVersion: v1
kind: Service
metadata:
  name: temporal
spec:
  type: ExternalName
  externalName: {{ .Release.Name }}-frontend.{{ .Release.Namespace }}.svc.cluster.local
