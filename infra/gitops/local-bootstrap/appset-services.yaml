# Local Services ApplicationSet (ADR-0004, ADR-0016). Identical to
# bootstrap/appset-services.yaml except the list generator carries a single
# { env: local } element and the git-files generator reads the local service
# values (infra/gitops/services/local/values/*.yaml). One Application per service,
# named `local-service-<svc>` (env-prefix; grouped by the `local` AppProject).
# The frontend is intentionally absent locally: it runs as a host process and is
# wired through the frontend-dev EndpointSlice (the imperative tail of cluster:full).
#
# sync-wave "5" holds this back until the whole local-platform tier (base "0",
# data "2", core "3"), local-secrets ("1"), and local-gateway ("4") are all
# Synced+Healthy — the same CNI-stability/middleware/DB-credential dependencies as
# prod, plus the per-service Secrets that local-secrets's sops-operator
# materialises. Without this, service pods raced Cilium/CoreDNS warm-up and the
# local registry on every `cluster:full` after a `cluster:stop`, landing in
# CrashLoopBackOff.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: local-services
  namespace: argocd
  labels:
    env: local
    app.kubernetes.io/part-of: services
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - { env: local, server: "https://kubernetes.default.svc" }
          - git:
              repoURL: https://github.com/tabmadi/microservices-monorepo-template.git
              revision: master
              files:
                - { path: "infra/gitops/services/{{ .env }}/values/*.yaml" }
  template:
    metadata:
      name: "{{ .env }}-service-{{ .path.filenameNormalized }}"
      labels:
        env: "{{ .env }}"
        app.kubernetes.io/part-of: services
        app.kubernetes.io/component: "{{ .path.filenameNormalized }}"
    spec:
      project: "{{ .env }}"
      source:
        repoURL: https://github.com/tabmadi/microservices-monorepo-template.git
        targetRevision: master
        path: infra/helm/service
        helm:
          valueFiles:
            - "../../gitops/services/{{ .env }}/values/{{ .path.filename }}"
      destination: { server: "{{ .server }}", namespace: platform }
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true, ServerSideApply=true]
        # Retry on failure — automated+selfHeal won't re-run a sync that errored
        # on the same commit; without this a transient repo-server/network blip
        # parks the generated app until a manual sync. Caps at 2m (ADR-0004).
        retry:
          limit: 20
          backoff: { duration: 10s, maxDuration: 2m, factor: 2 }
