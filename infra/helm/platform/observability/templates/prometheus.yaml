# Prometheus (ADR-0011): the Core-tier metrics store — a single prom/prometheus
# process with a local TSDB and native OTLP ingest, no object-storage dependency.
# One Deployment, mirroring Loki (SingleBinary) and Tempo. The horizontally
# scalable, object-storage-backed variant is the Mimir Scale swap (see values.yaml
# and docs/operational-surface.md), not this floor.
{{- $p := .Values.prometheus }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus
  labels: { app.kubernetes.io/name: prometheus, app.kubernetes.io/part-of: observability }
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
    # OTLP metrics arrive from the OTel collector (--web.enable-otlp-receiver).
    # Escape OTel dotted names to the classic Prometheus form (dots→underscores) +
    # unit/type suffixes: `http.server.duration` (seconds) becomes
    # http_server_duration_seconds_bucket, `orders.checkouts_started` becomes
    # orders_checkouts_started_total. This is the conventional Prometheus naming every
    # dashboard/PromQL example assumes — the alternative (NoUTF8Escaping, dotted
    # names) forces awkward `{"a.b.c"}` quoting on every query and is what left the
    # RED dashboard showing "No data". Resource attributes are otherwise dropped from
    # series, so promote service.name/namespace to labels dashboards can group by.
    otlp:
      translation_strategy: UnderscoreEscapingWithSuffixes
      promote_resource_attributes: ["service.name", "service.namespace"]
    # OTLP pushes can land slightly out of order across collector batches.
    storage:
      tsdb:
        out_of_order_time_window: 30m
    # Services push via OTLP; nothing is scraped by default.
    scrape_configs: []
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels: { app.kubernetes.io/name: prometheus, app.kubernetes.io/part-of: observability }
spec:
  replicas: {{ $p.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/name: prometheus }
  template:
    metadata:
      labels: { app.kubernetes.io/name: prometheus }
    spec:
      containers:
        - name: prometheus
          image: {{ $p.image }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/data
            - --storage.tsdb.retention.time={{ $p.retention }}
            - --web.enable-otlp-receiver
            - --web.listen-address=0.0.0.0:{{ $p.httpPort }}
          ports:
            - { name: http, containerPort: {{ $p.httpPort }} }
          readinessProbe: { httpGet: { path: /-/ready,   port: http }, initialDelaySeconds: 15 }
          livenessProbe:  { httpGet: { path: /-/healthy, port: http }, initialDelaySeconds: 30, periodSeconds: 30 }
          resources: {{- toYaml $p.resources | nindent 12 }}
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
            - { name: data,   mountPath: /data }
      volumes:
        - name: config
          configMap: { name: prometheus }
        # Local TSDB. Metrics live here until a project takes the Mimir Scale swap.
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels: { app.kubernetes.io/name: prometheus, app.kubernetes.io/part-of: observability }
spec:
  selector: { app.kubernetes.io/name: prometheus }
  ports:
    - { name: http, port: {{ $p.httpPort }}, targetPort: http }
