# Build + push container images on every merge to master (ADR-0002, ADR-0004).
# Images are tagged <service>:<git-sha>. Promotion to env values files happens
# in promote-on-merge.yml (dev/staging) and promote-on-release.yml (prod).
name: publish

on:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  affected:
    if: ${{ !github.event.repository.is_template }}
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.affected.outputs.services }}
      apps: ${{ steps.affected.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: jdx/mise-action@v2
        with: { install: true, cache: true }
      - id: affected
        run: |
          manifest=$(mise run ci:affected)
          echo "services=$(echo "$manifest" | jq -c '.services')" >> "$GITHUB_OUTPUT"
          echo "apps=$(echo "$manifest" | jq -c '.apps')" >> "$GITHUB_OUTPUT"

  images:
    needs: affected
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cmd: [server, worker]
        # The list of services is materialised from the affected job, which
        # emits the services array as a JSON-encoded output.
        service: ${{ fromJSON(needs.affected.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.service }}-${{ matrix.cmd }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          # Bake the build identity (ADR-0013): the commit SHA the pod will
          # self-report via /version and the X-App-Version header. BUILD_VERSION
          # stays "dev" for master builds; prod's CalVer is stamped on release.
          build-args: |
            APP_CMD=${{ matrix.cmd }}
            GIT_SHA=${{ github.sha }}
            BUILD_VERSION=dev
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}-${{ matrix.cmd }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Apps are single images (no server/worker split), so they get their own matrix
  # rather than joining the Go-service one — but both are driven by the same
  # ci:affected manifest. Each app ships its own Dockerfile; the build context
  # differs per app (the frontend builds from the repo root, scoped by its
  # Dockerfile.dockerignore; the admin from apps/admin, since the root
  # .dockerignore excludes apps/), so it is resolved per app below. The build SHA
  # is baked as SERVICE_VERSION (ADR-0013).
  apps:
    needs: affected
    if: ${{ needs.affected.outputs.apps != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.affected.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: ctx
        run: |
          case "${{ matrix.app }}" in
            admin) echo "context=apps/admin" >> "$GITHUB_OUTPUT" ;;
            *)     echo "context=." >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Build & push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.ctx.outputs.context }}
          file: apps/${{ matrix.app }}/Dockerfile
          build-args: SERVICE_VERSION=${{ github.sha }}
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
