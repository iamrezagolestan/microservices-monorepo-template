# Local Prometheus alerts Application (ADR-0011, ADR-0016). Local counterpart to
# bootstrap/app-prometheus-alerts.yaml: a Kustomize app that generates the
# `prometheus-alerts` ConfigMap from infra/observability/alerts/*.yaml for the
# observability chart to mount into Prometheus (rule_files). Makes alerts-as-code
# flow through GitOps locally too — the exact counterpart of
# app-grafana-dashboards.yaml for the alert rules. Synced by the local root-app,
# which recurses infra/gitops/local-bootstrap.
#
# Grouped by the `local` AppProject (appproject.yaml), like every other local app.
#
# Sync-wave 2 (data-tier slot): the ConfigMap must exist BEFORE the core tier
# (wave 3) starts Prometheus, which mounts it as a volume. A plain ConfigMap is
# Healthy the moment it applies, so wave 3 is not delayed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-prometheus-alerts
  namespace: argocd
  labels:
    env: local
    app.kubernetes.io/part-of: platform
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: local
  source:
    repoURL: https://github.com/tabmadi/microservices-monorepo-template.git
    targetRevision: master
    path: infra/observability/alerts
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry:
      limit: 20
      backoff: { duration: 10s, maxDuration: 2m, factor: 2 }
