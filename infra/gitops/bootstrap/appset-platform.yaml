metadata:
  name: platform-core
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: core
  annotations:
    # Wave 3: after the data tier is Healthy, so Tempo/Loki find MinIO + their
    # buckets and Ory/Temporal/OpenFGA/pgweb find a live Postgres.
    argocd.argoproj.io/sync-wave: "3"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - list:
