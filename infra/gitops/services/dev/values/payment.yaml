name: payment
image:
  repository: ghcr.io/tabmadi/microservices-monorepo-template/payment-server
  tag: "0000000000000000000000000000000000000000"
worker:
  enabled: true
  image:
    repository: ghcr.io/tabmadi/microservices-monorepo-template/payment-worker
    tag: "0000000000000000000000000000000000000000"
server:  { replicas: 1 }
ingress: { enabled: true, host: dev.example.com, resources: [charges] }
# The Lowdefy admin console (apps/admin) calls payment server-side, east-west on
# the server port, bypassing the /api edge (ADR-0012).
networkPolicy: { allowFrom: [lowdefy] }
secrets: { envFrom: [payment-db-creds, payment-temporal-creds, openfga-creds] }
env:
  # Write authz (ADR-0010): the server gates the operator-only refund via the shared
  # Checker. Blank preshared key falls back to openfga-creds.preshared_key (envFrom),
  # as catalog and the authz service do.
  OPENFGA_API_URL: "http://openfga.platform.svc.cluster.local:8080"
  OPENFGA_PRESHARED_KEY: ""
