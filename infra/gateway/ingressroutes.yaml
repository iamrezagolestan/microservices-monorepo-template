# Shared Traefik IngressRoutes (ADR-0009, ADR-0017). Per-service /api/<svc> routes
# are emitted by the service Helm chart (infra/helm/service/templates/ingressroute.yaml)
# on the product apex. These are the cross-cutting OPS-TIER routes.
#
# Trust-tier split (ADR-0017): every operator dashboard lives on its own origin
# `{concept}.ops.<host>`, never on a product path. HostRegexp keeps the manifests
# host-agnostic (env parity, ADR-0016) — `^{concept}\.ops\..+` matches
# {concept}.ops.dev.localtest.me locally and {concept}.ops.<apex> in every deployed env.
# The `*.ops.<host>` wildcard cert (secret wildcard-ops-tls) covers all of them.
#
# Each route is behind the ops forward-auth (Oathkeeper validates an AAL2 operator
# session and the per-tool `dashboard:<tool>#view` grant — ADR-0010/0017) and the
# identity-header strip + security-headers middlewares.
---
# Coroot service map + APM (ADR-0003, ADR-0025) — eBPF application observability
# (service in its own `coroot` namespace, cross-namespace ref like Argo). Replaced
# the Hubble UI here: Hubble's flow engine stays on (ADR-0009 audit surface), but
# its stagnant standalone UI is retired in favour of Coroot, which keys every
# workload by Deployment so multi-role apps (e.g. Temporal's frontend/history/
# matching/worker) show as distinct nodes instead of collapsing to one name.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ops-map
  namespace: platform
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: HostRegexp(`^map\.ops\..+`)
      middlewares:
        - name: strip-identity-headers
        - name: oathkeeper-forward-auth
        - name: security-headers
      services:
        - name: coroot-coroot
          namespace: coroot
          port: 8080
  tls:
    secretName: wildcard-ops-tls
---
# Grafana (ADR-0011) — served at root (serve_from_sub_path dropped, see chart).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ops-grafana
  namespace: platform
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: HostRegexp(`^o11y\.ops\..+`)
      middlewares:
        - name: strip-identity-headers
        - name: oathkeeper-forward-auth
        - name: security-headers
      services:
        - name: grafana
          port: 80
  tls:
    secretName: wildcard-ops-tls
---
# Lowdefy internal-admin console (ADR-0012). Oathkeeper injects X-User-Email,
# which Lowdefy keys off (see access-rules ops-admin rule).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ops-admin
  namespace: platform
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: HostRegexp(`^admin\.ops\..+`)
      middlewares:
        - name: strip-identity-headers
        - name: oathkeeper-forward-auth
        - name: security-headers
      services:
        - name: lowdefy
          port: 80
  tls:
    secretName: wildcard-ops-tls
---
# Argo CD (ADR-0004). server.insecure is on, so TLS terminates at Traefik and
# argocd-server serves http on :80. Argo is installed into its own `argocd`
# namespace (not `platform`), so the service ref is cross-namespace — the same
# pattern as Coroot in its `coroot` namespace. This needs Traefik allowCrossNamespace, on
# locally via infra/local/traefik-config.yaml; prod's own Traefik must enable it.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ops-argo
  namespace: platform
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: HostRegexp(`^deploy\.ops\..+`)
      middlewares:
        - name: strip-identity-headers
        - name: oathkeeper-forward-auth
        - name: security-headers
      services:
        - name: argocd-server
          namespace: argocd
          port: 80
  tls:
    secretName: wildcard-ops-tls
---
