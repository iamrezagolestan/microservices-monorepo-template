# Ansible is the day-one prod bootstrap (ADR-0003) and the only tool here that is
# not a single static binary — it is Python, and mise's registry resolves it to the
# `pipx:` backend. Two consequences, handled below.
#
# 1. SCOPE. Nothing in the repo drives ansible: no mise task, no CI workflow. An
#    operator runs `ansible-playbook -i inventory/<env> bootstrap.yml` by hand
#    against remote hosts (docs/cluster/dr-runbook.md). Pinning it at the root
#    would make every dev install a Python toolchain to run `lint`. So it lives
#    here instead — a tool-confined island, the same exception ADR-0018 makes for
#    the Playwright runner and apps/admin makes for Lowdefy's pnpm. It installs on
#    `cd infra/ansible`, for the operators who actually run it.
#
# 2. NO HOST PYTHON. The `pipx:` backend shells out to a host pipx + python, which
#    are not pinned by anything and are absent on a clean machine or in CI — it
#    only appears to work on a dev box that happens to have them. `pipx.uvx` swaps
#    that for uv: a single static binary, pinned below like everything else, which
#    builds ansible a private venv and fetches its own CPython. Nothing is borrowed
#    from the host. uv must be pinned explicitly — the backend does not imply it,
#    and leaving it out just moves the "works only where the host happens to have
#    it" bug from pipx to uv.
[settings]
pipx.uvx = true

[tools]
uv = "0.11.21"
ansible = "14.0.0"
