openapi: 3.1.0
info: { title: payment, version: 0.1.0, description: Payment charge and settlement service., x-audience: public }
servers: [{ url: /api }]   # flat resource namespace (ADR-0017); paths are globally unique
tags: [{ name: charges }]
paths:
  /charges:
    post:
      operationId: createCharge
      tags: [charges]
      description: |
        Starts the Charge Temporal workflow. Idempotent on Idempotency-Key header.
        Returns a workflow handle (ADR-0006).
      parameters:
        - { name: Idempotency-Key, in: header, required: true, description: Client-generated key that makes the charge request idempotent., schema: { type: string } }
      requestBody:
        required: true
        description: The charge to create.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChargeInput" }
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkflowHandle" }
        default: { $ref: "#/components/responses/Error" }
  /charges/{id}:
    get:
      operationId: getCharge
      description: Fetch a charge by id.
      tags: [charges]
      parameters: [{ name: id, in: path, required: true, description: Charge id., schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Charge" } } } }
        default: { $ref: "#/components/responses/Error" }
  /charges/{id}/refund:
    post:
      operationId: refundCharge
      # Operator action (ADR-0012): the future admin-gen emits this as an action
      # button/form, not a CRUD page (`x-admin: action`). Edge-reachable first-party
      # but kept out of the public docs (`internal`, ADR-0008 audience ladder) —
      # refunding is an operator action, not a public self-serve op.
      x-admin: action
      x-audience: internal
      description: Refund a settled charge. Starts the Refund workflow (ADR-0006).
      tags: [charges]
      parameters: [{ name: id, in: path, required: true, description: Id of the charge to refund., schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        description: The refund request.
        content: { application/json: { schema: { $ref: "#/components/schemas/RefundInput" } } }
      responses:
        "202":
          description: Refund accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkflowHandle" }
        default: { $ref: "#/components/responses/Error" }
components:
  responses:
    Error:
      description: Error response
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
  schemas:
    Problem:
      type: object
      description: RFC 7807 problem document.
      required: [code, message]
      properties:
        code:    { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }
    WorkflowHandle:
      type: object
      description: Handle to an async Temporal workflow run.
      required: [id, run_id, status]
      properties:
        id:     { type: string }
        run_id: { type: string }
        status: { type: string, enum: [running, completed, failed, cancelled] }
        result_url: { type: string, format: uri, description: "GET to fetch terminal status + result" }
    ChargeInput:
      type: object
      description: Request body to create a charge.
      required: [order_id, amount_cents]
      properties:
        order_id:     { type: string, format: uuid }
        amount_cents: { type: integer, minimum: 1 }
    RefundInput:
      type: object
      description: Request body to refund a charge.
      required: [reason]
      properties:
        reason: { type: string, minLength: 1 }
    Charge:
      type: object
      description: A payment charge against an order.
      required: [id, order_id, amount_cents, status]
      properties:
        id:           { type: string, format: uuid }
        order_id:     { type: string, format: uuid }
        amount_cents: { type: integer }
        status:       { type: string, enum: [pending, settled, failed, refunded] }
