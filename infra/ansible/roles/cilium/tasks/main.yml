# Install Cilium as the cluster CNI (ADR-0003). Runs on the first server node only,
# before ArgoCD is bootstrapped — pods cannot be scheduled without a CNI.
# ArgoCD adopts the release on its first sync and manages upgrades from that point on.
- name: Wait for k3s kubeconfig
  wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    timeout: 120
  when: inventory_hostname == groups['servers'][0]

- name: Add Cilium Helm repo
  shell: helm repo add cilium https://helm.cilium.io && helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: inventory_hostname == groups['servers'][0]

- name: Install Cilium
  shell: |
    helm upgrade --install cilium cilium/cilium \
      --version {{ cilium_version }} \
      --namespace kube-system \
      --set kubeProxyReplacement=true \
      --set k8sServiceHost=127.0.0.1 \
      --set k8sServicePort=6443 \
      --set ipam.mode=kubernetes \
      --set hubble.enabled=true \
      --set hubble.relay.enabled=true \
      --set hubble.ui.enabled=false \
      --wait --timeout=5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: inventory_hostname == groups['servers'][0]

# hubble-peer is backed by the cilium-agent pod itself (hostPort :4244); the chart
# ships it with no publishNotReadyAddresses. When an agent restarts, its endpoint
# goes NotReady and Cilium's LB can quarantine that backend, breaking hubble-relay's
# peer discovery (fatal under kubeProxyReplacement=false, cosmetic under true). Keep
# the peer endpoint always-ready so a restarting agent never gets health-gated out.
- name: Keep hubble-peer endpoints published across agent restarts
  shell: >
    kubectl -n kube-system patch svc hubble-peer --type merge
    -p '{"spec":{"publishNotReadyAddresses":true}}'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: inventory_hostname == groups['servers'][0]
