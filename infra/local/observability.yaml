# Opt-in local observability (ADR-0011). NOT part of the lightweight cluster:up
# deps — deployed only via the Skaffold `obs` profile (`skaffold dev -p obs` /
# `mise run dev:obs`), since the bundle is heavy and most loops don't need it.
#
# Two pieces, both ephemeral:
#   - grafana/otel-lgtm: the single-image LGTM bundle (Grafana :3000, OTLP
#     :4317/:4318). Services point OTEL_EXPORTER_OTLP_ENDPOINT here.
#   - Grafana Alloy faro.receiver: the local stand-in for the production OTel
#     Collector's `faro` receiver. The host-run frontend's dev shim
#     (apps/frontend/src/app/api/observability/faro/collect/route.ts) forwards
#     browser beacons here; Alloy re-exports them as OTLP into the bundle so RUM
#     lands in the same Loki/Tempo as service telemetry.
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: otel-lgtm, namespace: platform }
spec:
  replicas: 1
  selector: { matchLabels: { app: otel-lgtm } }
  template:
    metadata: { labels: { app: otel-lgtm } }
    spec:
      containers:
        - name: otel-lgtm
          image: grafana/otel-lgtm:latest
          ports:
            - { name: grafana,   containerPort: 3000 }
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
          # The bundle signals readiness by creating /tmp/ready once Grafana and
          # the embedded collector are both up — that's the image's own healthcheck.
          readinessProbe:
            exec: { command: ["test", "-f", "/tmp/ready"] }
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: otel-lgtm, namespace: platform }
spec:
  selector: { app: otel-lgtm }
  ports:
    - { name: grafana,   port: 3000, targetPort: 3000 }
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
---
# Alloy config — mirrors the in-cluster faro receiver, exporting to the bundle's
# OTLP endpoint over the platform Service DNS instead of the prod LGTM backends.
apiVersion: v1
kind: ConfigMap
metadata: { name: faro-alloy, namespace: platform }
data:
  config.alloy: |
    otelcol.exporter.otlphttp "lgtm" {
      client {
        endpoint = "http://otel-lgtm:4318"
        tls {
          insecure = true
        }
      }
    }

    // Faro logs are emitted in Loki format; convert them to OTLP so everything
    // reaches the bundle over a single OTLP exporter.
    otelcol.receiver.loki "faro" {
      output {
        logs = [otelcol.exporter.otlphttp.lgtm.input]
      }
    }

    faro.receiver "frontend" {
      server {
        listen_address       = "0.0.0.0"
        listen_port          = 12347
        cors_allowed_origins = ["*"]
      }
      output {
        logs   = [otelcol.receiver.loki.faro.receiver]
        traces = [otelcol.exporter.otlphttp.lgtm.input]
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: faro, namespace: platform }
spec:
  replicas: 1
  selector: { matchLabels: { app: faro } }
  template:
    metadata: { labels: { app: faro } }
    spec:
      containers:
        - name: alloy
          image: grafana/alloy:latest
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/tmp/alloy
          ports:
            - { name: faro,    containerPort: 12347 }
            - { name: alloy-ui, containerPort: 12345 }
          volumeMounts:
            - { name: config, mountPath: /etc/alloy }
      volumes:
        - name: config
          configMap: { name: faro-alloy }
---
apiVersion: v1
kind: Service
metadata: { name: faro, namespace: platform }
spec:
  selector: { app: faro }
  ports:
    - { name: faro,     port: 12347, targetPort: 12347 }
    - { name: alloy-ui, port: 12345, targetPort: 12345 }
