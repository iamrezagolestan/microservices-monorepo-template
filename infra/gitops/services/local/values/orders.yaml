# Local full-tier values for the orders service (ADR-0016). Read by the local
# services ApplicationSet (infra/gitops/local-bootstrap/appset-services.yaml).
# Same chart as dev/prod; only host, image tag, and the SOPS secret name differ.
# The secret name (orders-db) matches the local SopsSecret resource
# (infra/gitops/platform/local/secrets/platform.enc.yaml), not dev's *-db-creds.
name: orders
image:
  repository: k3d-registry.localhost:5000/orders-server
  tag: local            # local registry (CI stand-in); prod uses a git SHA (ADR-0002)
  pullPolicy: Always    # re-pull the rebuilt :local on a cluster:full re-run
worker:
  enabled: true
  image:
    repository: k3d-registry.localhost:5000/orders-worker
    tag: local
server:  { replicas: 1 }
ingress: { enabled: true, host: dev.localtest.me, resources: [orders] }
otel:    { deployEnv: local }
# The Lowdefy admin console (apps/admin) calls orders server-side, east-west on
# the server port, bypassing the /api edge (ADR-0012).
networkPolicy: { allowFrom: [lowdefy] }
secrets: { envFrom: [orders-db] }
env:
  CATALOG_URL: http://catalog-server.platform.svc.cluster.local
  PAYMENT_URL: http://payment-server.platform.svc.cluster.local
