apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfga
  namespace: platform
  labels:
    app.kubernetes.io/name: openfga
    app.kubernetes.io/part-of: platform
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: openfga
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openfga
    spec:
      enableServiceLinks: false   # avoid k8s injecting OPENFGA_* Service-link env vars
      {{- if .Values.migrate.enabled }}
      initContainers:
        # Bring the Postgres datastore to head before serving. `migrate` is
        # idempotent and safe on every replica/restart, and self-orders against
        # Postgres by failing + retrying until reachable.
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args: ["migrate"]
          env:
            - name: OPENFGA_DATASTORE_ENGINE
              value: postgres
            - name: OPENFGA_DATASTORE_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: datastore_uri
      {{- end }}
      containers:
        - name: openfga
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args: ["run"]
          env:
            - name: OPENFGA_DATASTORE_ENGINE
              value: postgres
            - name: OPENFGA_LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: OPENFGA_AUTHN_METHOD
              value: preshared
            - name: OPENFGA_AUTHN_PRESHARED_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: preshared_key
            - name: OPENFGA_DATASTORE_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: datastore_uri
          ports:
            - { name: http,    containerPort: 8080 }
            - { name: metrics, containerPort: 2112 }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
