apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "service.fullname" . }}-server
  labels: {{- include "service.labels" . | nindent 4 }}
    component: server
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels: {{- include "service.selector" . | nindent 6 }}
      component: server
  template:
    metadata:
      labels: {{- include "service.selector" . | nindent 8 }}
        component: server
    spec:
      serviceAccountName: {{ include "service.fullname" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.migrations.enabled }}
      initContainers:
        # dbmate runs from the service image itself — it carries the static dbmate
        # binary and the baked /db/migrations (see the service Dockerfile). `migrate`
        # (not `up`) skips DB creation: CNPG provisions the databases (ADR-0007).
        - name: migrations
          image: {{ include "service.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["/usr/local/bin/dbmate", "--no-dump-schema", "--migrations-dir", "/db/migrations", "migrate"]
          envFrom:
            {{- range .Values.secrets.envFrom }}
            - secretRef: { name: {{ . }} }
            {{- end }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "service.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - { name: http,  containerPort: {{ .Values.server.port }} }
            - { name: admin, containerPort: {{ .Values.server.adminPort }} }
          env:
            {{- include "service.otelEnv" . | nindent 12 }}
            {{- range $k, $v := .Values.env }}
            - { name: {{ $k }}, value: {{ $v | quote }} }
            {{- end }}
          envFrom:
            {{- range .Values.secrets.envFrom }}
            - secretRef: { name: {{ . }} }
            {{- end }}
          # readiness = deep (deps pinged) → gates Service traffic without restarting;
          # liveness = shallow (process alive) → never dep-aware (ADR-0011).
          readinessProbe: { httpGet: { path: /readyz, port: admin }, initialDelaySeconds: 2, timeoutSeconds: 4 }
          livenessProbe:  { httpGet: { path: /livez,  port: admin }, periodSeconds: 30 }
          resources: {{- toYaml .Values.server.resources | nindent 12 }}
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            {{- range .Values.secrets.files }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        - { name: tmp, emptyDir: {} }
        {{- range .Values.secrets.files }}
        - name: {{ .name }}
          secret: { secretName: {{ .name }} }
        {{- end }}
