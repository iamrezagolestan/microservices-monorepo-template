apiVersion: v2
name: coroot
description: >-
  Coroot Community Edition (Apache-2.0) — eBPF service map + APM (ADR-0025).
  Replaces the retired standalone Hubble UI: keys every workload by Deployment,
  so multi-role apps (e.g. Temporal's frontend/history/matching/worker) show as
  distinct nodes instead of collapsing to a single name. Runs in its own `coroot`
  namespace. The Hubble flow engine (ADR-0003/0009) stays on; only its UI is gone.
type: application
version: 0.1.0
appVersion: "1.23.3"

dependencies:
  - name: coroot-operator
    version: "0.9.7"
    repository: https://coroot.github.io/helm-charts
