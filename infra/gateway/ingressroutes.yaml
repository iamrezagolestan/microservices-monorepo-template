        - name: oathkeeper-forward-auth
        - name: security-headers
      services:
        - name: headlamp
          port: 80
  tls:
    secretName: wildcard-ops-tls
---
# pgweb — read-only DB inspector (ADR-0012, ADR-0017). Core: the backend Service
# exists in every env; setting pgweb.enabled=false leaves the route with no endpoints.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
