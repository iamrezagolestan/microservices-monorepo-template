openapi: 3.1.0
info: { title: authz, version: 0.1.0, description: Ops-tier edge authorizer and operator admin (ADR-0010/0012/0017)., x-audience: cluster }
servers: [{ url: / }]   # east-west control-plane service; no /api edge route (ADR-0009)
tags: [{ name: authorize }, { name: operators }]
paths:
  /authorize:
    post:
      operationId: authorize
      # Ops-tier decision for Oathkeeper's remote_json authorizer: 200 = allow,
      # 403 = deny. The request shape mirrors the remote_json payload in
      # infra/auth/oathkeeper/access-rules.json (that config remains the caller's
      # contract; this spec is authz's own view of the same shape).
      description: Ops-tier authorization decision for Oathkeeper's remote_json authorizer.
      tags: [authorize]
      requestBody:
        required: true
        description: The decision request forwarded by Oathkeeper.
        content: { application/json: { schema: { $ref: "#/components/schemas/AuthorizeRequest" } } }
      responses:
        "200": { description: Allowed. }
        "403":
          description: Denied.
          content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } }
        default: { $ref: "#/components/responses/Error" }
  /operators:
    post:
      operationId: createOperator
      # Generated admin page target (ADR-0012): a control-plane action, not CRUD.
      x-admin: action
      description: Create an operator identity and grant the operator role.
      tags: [operators]
      requestBody:
        required: true
        description: The operator to create.
        content: { application/json: { schema: { $ref: "#/components/schemas/OperatorInput" } } }
      responses:
        "200": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Operator" } } } }
        default: { $ref: "#/components/responses/Error" }
components:
  responses:
    Error:
      description: Error response
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
  schemas:
    Problem:
      type: object
      description: RFC 7807 problem document.
      required: [code, message]
      properties:
        code:    { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }
    AuthorizeRequest:
      type: object
      description: The remote_json payload Oathkeeper POSTs per ops-dashboard request.
      required: [subject, tool, aal, operator]
      properties:
        subject:  { type: string, description: Kratos identity id; empty for anonymous. }
        tool:     { type: string, description: Ops dashboard slug such as o11y or network. }
        aal:      { type: string, description: authenticator_assurance_level from the session. }
        operator: { type: string, description: The operator identity trait; "true" when set. }
    OperatorInput:
      type: object
      description: Request body to create an operator.
      required: [email, password]
      properties:
        email:    { type: string, minLength: 1 }
        password: { type: string, minLength: 1 }
    Operator:
      type: object
      description: A created operator.
      required: [id, email]
      properties:
        id:    { type: string }
        email: { type: string }
