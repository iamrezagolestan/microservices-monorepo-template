# Alerts-as-code (ADR-0011). This kustomization turns the committed Prometheus
# rule files in this directory into the `prometheus-alerts` ConfigMap the
# observability chart mounts into Prometheus at /etc/prometheus/rules
# (rule_files: /etc/prometheus/rules/*.yaml). It is synced by the
# prometheus-alerts ArgoCD Application (infra/gitops/{bootstrap,local-bootstrap}/
# app-prometheus-alerts.yaml) — the exact pattern the sibling dashboards/
# directory uses for Grafana, so a PR that adds or edits a rule file here reaches
# the cluster on the next Argo pass. Prometheus loads rule files at startup and
# on config reload; a ConfigMap-only change is picked up on the next pod restart
# (the chart upgrade that usually accompanies it rolls the pod).
#
# disableNameSuffixHash: the chart references the ConfigMap by the STABLE name
# `prometheus-alerts`; kustomize's default content-hash suffix would rename it on
# every edit and break that reference.
#
# Files are listed explicitly (kustomize's configMapGenerator does not glob
# portably across versions). ADD A LINE HERE when you add a new rule file —
# that PR is what publishes it, keeping alerts-as-code honest end to end.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: platform
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: prometheus-alerts
    files:
      - service-availability.yaml
      - policy-drops.yaml
