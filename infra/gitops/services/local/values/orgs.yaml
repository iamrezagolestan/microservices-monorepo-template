# Local full-tier values for the orgs service (ADR-0016). See orders.yaml for the
# secret-naming note (orgs-db = local SopsSecret resource).
name: orgs
image:
  repository: k3d-registry.localhost:5000/orgs-server
  tag: local            # local registry (CI stand-in); prod uses a git SHA (ADR-0002)
  pullPolicy: Always    # re-pull the rebuilt :local on a cluster:full re-run
worker:
  enabled: true            # RegisterUser dual-write (ADR-0006/0010)
  image:
    repository: k3d-registry.localhost:5000/orgs-worker
    tag: local
server:  { replicas: 1 }
ingress: { enabled: true, host: dev.localtest.me, resources: [orgs] }
otel:    { deployEnv: local }
# Kratos calls /identity-created east-west on the server port (ADR-0010); the
# edge (allowFromGateway) only covers Traefik → /api/orgs, so allow Kratos too.
# The Lowdefy admin console (apps/admin) also calls orgs server-side (ADR-0012).
networkPolicy: { allowFrom: [kratos, lowdefy] }
secrets: { envFrom: [orgs-db, spicedb-creds] }
env:
  # Write authz (ADR-0010): the worker grants org admin via the shared SpiceDB
  # Granter. Blank preshared key falls back to spicedb-creds.preshared_key (envFrom).
  SPICEDB_ENDPOINT: "spicedb.platform.svc.cluster.local:50051"
  SPICEDB_PRESHARED_KEY: ""
