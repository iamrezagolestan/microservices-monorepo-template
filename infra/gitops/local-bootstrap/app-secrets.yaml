# Local secrets delivery (ADR-0005, ADR-0016). Applies the encrypted SopsSecret CR
# (infra/gitops/platform/local/secrets/platform.enc.yaml); the sops-operator (a
# platform chart) reconciles it into native Secrets (postgres-superuser,
# temporal-db-creds, spicedb-creds, kratos-secrets, observability-bucket, *-db).
#
# The operator's own decryption key (sops-age-key) cannot live in git as a usable
# Secret, so cluster:full creates it imperatively before applying the local root-app.
#
# Same sync-wave "0" as the local-platform ApplicationSet, NOT a later wave: the
# platform charts (postgres, spicedb, ory, observability) CONSUME these Secrets, so
# they are a dependency of the platform tier reaching health, not a step after it. A
# later wave deadlocks — local-platform's wave-0 health gate (all generated apps
# Synced+Healthy) can never close, because those charts sit in
# CreateContainerConfigError waiting for Secrets that a higher wave won't apply until
# the gate closes. Running concurrently, this initially errors (the SopsSecret CRD
# arrives with the sops-operator that local-platform installs) and rides its
# retry/backoff until the CRD is Established.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-secrets
  namespace: argocd
  labels:
    env: local
    app.kubernetes.io/part-of: secrets
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: local
  source:
    repoURL: https://github.com/tabmadi/microservices-monorepo-template.git
    targetRevision: master
    path: infra/gitops/platform/local/secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
    retry:
      limit: 20
      backoff: { duration: 10s, maxDuration: 2m, factor: 2 }
