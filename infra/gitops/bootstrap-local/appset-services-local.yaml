# Local Services ApplicationSet (ADR-0004, ADR-0016). Identical to
# bootstrap/appset-services.yaml except the list generator carries a single
# { env: local } element and the git-files generator reads the local service
# values (infra/gitops/services/local/values/*.yaml). One Application per service.
# The frontend is intentionally absent locally: it runs as a host process and is
# wired through the frontend-dev EndpointSlice (the imperative tail of cluster:full).
#
# sync-wave "25" holds this back until platform-local (wave "0"), gateway-local
# (wave "5"), and secrets-local (wave "20") are all Synced+Healthy — the same
# CNI-stability/middleware/DB-credential dependencies as prod, plus the
# per-service Secrets that secrets-local's sops-operator materialises. Without
# this, service pods raced Cilium/CoreDNS warm-up and the local registry on
# every `cluster:full` after a `cluster:stop`, landing in CrashLoopBackOff.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: services-local
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - { env: local, server: "https://kubernetes.default.svc" }
          - git:
              repoURL: https://github.com/tabmadi/microservices-monorepo-template.git
              revision: master
              files:
                - { path: "infra/gitops/services/{{ .env }}/values/*.yaml" }
  template:
    metadata:
      name: "{{ .env }}-svc-{{ .path.filenameNormalized }}"
    spec:
      project: default
      source:
        repoURL: https://github.com/tabmadi/microservices-monorepo-template.git
        targetRevision: master
        path: infra/helm/service
        helm:
          valueFiles:
            - "../../gitops/services/{{ .env }}/values/{{ .path.filename }}"
      destination: { server: "{{ .server }}", namespace: platform }
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true, ServerSideApply=true]
