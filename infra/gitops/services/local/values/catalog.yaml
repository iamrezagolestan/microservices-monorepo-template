# Local full-tier values for the catalog service (ADR-0016). See orders.yaml for
# the secret-naming note (catalog-db = local SopsSecret resource).
name: catalog
image:
  repository: k3d-registry.localhost:5000/catalog-server
  tag: local            # local registry (CI stand-in); prod uses a git SHA (ADR-0002)
  pullPolicy: Always    # re-pull the rebuilt :local on a cluster:full re-run
worker:  { enabled: false }
server:  { replicas: 1 }
ingress: { enabled: true, host: dev.localtest.me, resources: [products] }
otel:    { deployEnv: local }
secrets: { envFrom: [catalog-db, spicedb-creds] }
env:
  # Write authz (ADR-0010): dial SpiceDB via the shared Checker. Blank preshared key
  # falls back to spicedb-creds.preshared_key (envFrom), as the authz service does.
  SPICEDB_ENDPOINT: "spicedb.platform.svc.cluster.local:50051"
  SPICEDB_PRESHARED_KEY: ""
