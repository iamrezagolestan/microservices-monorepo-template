## Kratos — identity APIs. Public (4433) is reached by Oathkeeper (session
## checks) and the edge gateway (login/registration flows).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ory-kratos
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: kratos
  ingress:
    - fromEndpoints:
        - matchLabels: { k8s:io.kubernetes.pod.namespace: platform, app.kubernetes.io/name: oathkeeper }
      toPorts:
        - ports: [{ port: "4433", protocol: TCP }]
    - fromEndpoints:
        - matchLabels: { k8s:io.kubernetes.pod.namespace: kube-system }
      toPorts:
        - ports: [{ port: "4433", protocol: TCP }]
---
## Oathkeeper — the edge auth gate. Traefik forwards through the proxy (4455) and
## queries the decision API (4456).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ory-oathkeeper
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: oathkeeper
  ingress:
    - fromEndpoints:
        - matchLabels: { k8s:io.kubernetes.pod.namespace: kube-system }
      toPorts:
        - ports:
            - { port: "4455", protocol: TCP }
            - { port: "4456", protocol: TCP }
