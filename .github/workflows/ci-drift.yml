# Drift check (ADR-0002, ADR-0008). Regenerate AND reformat everything, then fail if
# anything changed.
#
# Formatting is part of this check, not of `lint`: the linters are analysers
# (shellcheck, golangci-lint run, biome lint, rumdl check) and none of them rewrite
# code, so a correctly-analysed-but-misformatted file passes `mise run lint` cleanly.
# Only the formatters (shfmt, golangci-lint fmt, biome format, rumdl fmt) can tell,
# and they do it by rewriting — which is exactly the shape this drift job already
# handles for generated code.
name: ci-drift

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Regenerate and reformat
        run: mise run gen && mise run format

      - name: Fail on drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated or formatted artifacts are out of date. Run 'mise run gen && mise run format' and commit the result."
            exit 1
          fi
