# Shared Traefik IngressRoutes (ADR-0009, ADR-0017). Per-service /api/<svc> routes
# are emitted by the service Helm chart (infra/helm/service/templates/ingressroute.yaml)
# on the product apex. These are the cross-cutting OPS-TIER routes.
#
# Trust-tier split (ADR-0017): every operator dashboard lives on its own origin
# `{tool}.ops.<host>`, never on a product path. HostRegexp keeps the manifests
# host-agnostic (env parity, ADR-0016) — `^{tool}\.ops\..+` matches
# {tool}.ops.dev.localtest.me locally and {tool}.ops.<apex> in every deployed env.
# The `*.ops.<host>` wildcard cert (secret wildcard-ops-tls) covers all of them.
#
# Each route is behind the ops forward-auth (Oathkeeper validates an AAL2 operator
# session and the per-tool `dashboard:<tool>#view` grant — ADR-0010/0017) and the
# identity-header strip + security-headers middlewares.
---
# Hubble UI (ADR-0003, ADR-0025) — Cilium network-flow visibility / service map
# (service in kube-system, cross-namespace ref like Argo). Grafana owns detail
# (RED/SLO/logs/traces/profiling); Hubble UI owns the interactive map + drop
# investigation. Known trade-off (ADR-0025): it collapses workloads sharing
# `app.kubernetes.io/name` (all Temporal roles → "temporal").
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ops-hubble
  namespace: platform
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: HostRegexp(`^hubble\.ops\..+`)
      middlewares:
        - name: strip-identity-headers
        - name: oathkeeper-forward-auth
        - name: security-headers
      services:
        - name: hubble-ui
          namespace: kube-system
          port: 80
  tls:
    secretName: wildcard-ops-tls
---
# Grafana (ADR-0011) — served at root (serve_from_sub_path dropped, see chart).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
