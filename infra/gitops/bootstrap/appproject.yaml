# Per-environment AppProjects (ADR-0004). ArgoCD's real tenancy/grouping
# primitive — the platform/service Applications the appsets fan out are grouped
# *by* these (spec.project: <env>), not by parsing the `<env>-` name prefix.
#
# Applied by the root app-of-apps before the apps that reference them (sync-wave
# "-10"). Scoped to this repo + the in-cluster server to demonstrate the boundary;
# resource whitelists stay wide-open because platform charts install arbitrary
# CRDs/cluster-scoped objects (a narrow whitelist would wedge them).
#
# gateway + root stay in the built-in `default` project (see app-gateway.yaml,
# root-application.yaml) — they are single, cross-env apps with no one env to own.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: dev
  namespace: argocd
  labels:
    env: dev
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  description: Dev environment — platform + services.
  sourceRepos:
    - https://github.com/tabmadi/microservices-monorepo-template.git
  destinations:
    - { server: https://kubernetes.default.svc, namespace: "*" }
  clusterResourceWhitelist:
    - { group: "*", kind: "*" }
  namespaceResourceWhitelist:
    - { group: "*", kind: "*" }
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: staging
  namespace: argocd
  labels:
    env: staging
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  description: Staging environment — platform + services.
  sourceRepos:
    - https://github.com/tabmadi/microservices-monorepo-template.git
  destinations:
    - { server: https://kubernetes.default.svc, namespace: "*" }
  clusterResourceWhitelist:
    - { group: "*", kind: "*" }
  namespaceResourceWhitelist:
    - { group: "*", kind: "*" }
  # ADR-0004: staging auto-syncs only inside a daily 05:00 UTC / 1h window;
  # manualSync permits ad-hoc `argocd app sync` outside it for incident response.
  syncWindows:
    - kind: allow
      schedule: "0 5 * * *"
      duration: 1h
      applications: ["*"]
      manualSync: true
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: prod
  namespace: argocd
  labels:
    env: prod
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  description: Prod environment — platform + services.
  sourceRepos:
    - https://github.com/tabmadi/microservices-monorepo-template.git
  destinations:
    - { server: https://kubernetes.default.svc, namespace: "*" }
  clusterResourceWhitelist:
    - { group: "*", kind: "*" }
  namespaceResourceWhitelist:
    - { group: "*", kind: "*" }
