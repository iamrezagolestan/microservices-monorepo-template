# Grafana Alloy (ADR-0025 POC) — the pprof-scraping agent that feeds Pyroscope.
# It discovers pods in the platform namespace, keeps those exposing the `admin`
# port (the pprof endpoint every Go service serves via obs.Init, ADR-0011), scrapes
# CPU/heap/goroutine profiles, and pushes them to Pyroscope. Runs as a single
# Deployment (not a DaemonSet): pull-based profiling is node-agnostic, and one
# replica keeps the POC footprint small.
#
# No new NetworkPolicy is needed for the scrape path: services already allow
# platform-namespace ingress to their admin port, and the baseline policy already
# allows every platform pod intra-namespace egress + API-server access (for the
# Kubernetes pod discovery below).
{{- $al := .Values.alloy }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  labels: { app.kubernetes.io/name: alloy, app.kubernetes.io/part-of: observability }
---
# Cluster-scoped: pod discovery watches across the API. Name is prefixed so it does
# not collide with any other Alloy install in the cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: observability-alloy
  labels: { app.kubernetes.io/name: alloy, app.kubernetes.io/part-of: observability }
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: observability-alloy
  labels: { app.kubernetes.io/name: alloy, app.kubernetes.io/part-of: observability }
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: observability-alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy
  labels: { app.kubernetes.io/name: alloy, app.kubernetes.io/part-of: observability }
data:
  config.alloy: |
    // Discover every pod, then keep only platform-namespace pods that expose the
    // `admin` container port (9090) — i.e. the Go services' pprof endpoint.
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pprof" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        regex         = "platform"
        action        = "keep"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_port_name"]
        regex         = "admin"
        action        = "keep"
      }
      // Label profiles so Grafana can filter by service and pod. service_name
      // matches the RED/log/trace label the rest of the dashboards use.
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        target_label  = "service_name"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
    }

    // Scrape the standard Go pprof profiles (CPU, heap, goroutine on by default)
    // from /debug/pprof and forward them to Pyroscope.
    pyroscope.scrape "pprof" {
      targets    = discovery.relabel.pprof.output
      forward_to = [pyroscope.write.local.receiver]
    }

    pyroscope.write "local" {
      endpoint {
        url = "http://pyroscope.platform.svc.cluster.local:4040"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  labels: { app.kubernetes.io/name: alloy, app.kubernetes.io/part-of: observability }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: alloy }
  template:
    metadata:
      labels: { app.kubernetes.io/name: alloy }
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: {{ $al.image }}
          args:
            - run
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
            - /etc/alloy/config.alloy
          ports:
            - { name: http, containerPort: 12345 }
          resources: {{- toYaml $al.resources | nindent 12 }}
          volumeMounts:
            - { name: config, mountPath: /etc/alloy }
            - { name: data,   mountPath: /var/lib/alloy/data }
      volumes:
        - name: config
          configMap: { name: alloy }
        - name: data
          emptyDir: {}
