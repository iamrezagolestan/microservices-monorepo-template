# Build + push container images on every merge to master (ADR-0002, ADR-0004).
# Images are tagged <service>:<git-sha>. Promotion to env values files happens
# in promote-on-merge.yml (dev/staging) and promote-on-release.yml (prod).
name: publish

on:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  affected:
    if: ${{ !github.event.repository.is_template }}
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.affected.outputs.services }}
      apps: ${{ steps.affected.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: jdx/mise-action@v2
        with: { install: true, cache: true }
      - id: affected
        run: |
          manifest=$(mise run ci:affected)
          echo "services=$(echo "$manifest" | jq -c '.services')" >> "$GITHUB_OUTPUT"
          echo "apps=$(echo "$manifest" | jq -c '.apps')" >> "$GITHUB_OUTPUT"

  images:
    needs: affected
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cmd: [server, worker]
        # The list of services is materialised from the affected job, which
        # emits the services array as a JSON-encoded output.
        service: ${{ fromJSON(needs.affected.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.service }}-${{ matrix.cmd }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          # Bake the build identity (ADR-0013): the commit SHA the pod will
          # self-report via /version and the X-App-Version header. BUILD_VERSION
          # stays "dev" for master builds; prod's CalVer is stamped on release.
          build-args: |
            APP_CMD=${{ matrix.cmd }}
            GIT_SHA=${{ github.sha }}
            BUILD_VERSION=dev
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}-${{ matrix.cmd }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # The frontend is an app, not a Go service, so it builds from its own Dockerfile
  # (context = repo root, using apps/frontend/Dockerfile.dockerignore) with the
  # build SHA baked in as SERVICE_VERSION (ADR-0013, ADR-0014).
  frontend-image:
    needs: affected
    if: ${{ contains(fromJSON(needs.affected.outputs.apps), 'frontend') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          build-args: SERVICE_VERSION=${{ github.sha }}
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
