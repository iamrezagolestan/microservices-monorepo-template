# Top-level `cluster:` — the postgres chart's own values schema has no
# `postgres:` namespace wrapper (unlike the dependency subcharts below).
cluster:
  instances: 3
  storage: { size: 100Gi }
  backup:
    retentionPolicy: "7d"
    s3: { endpointURL: "http://minio.platform.svc.cluster.local:9000", destinationPath: "s3://platform-backups/postgres" }

# Non-prod object storage is in-cluster MinIO (ADR-0016); prod keeps the
# chart defaults (the off-cluster bucket) and disables this chart entirely.
loki:
  loki:
    storage:
      s3:
        endpoint: minio.platform.svc.cluster.local:9000
        s3ForcePathStyle: true
        insecure: true
tempo:
  tempo:
    storage:
      trace:
        s3:
          endpoint: minio.platform.svc.cluster.local:9000
          insecure: true

# Lowdefy admin console (ADR-0012): the one repo-built platform image, promoted by
# git SHA on merge (promote-on-merge), like the services and the frontend.
lowdefy:
  image:
    repository: ghcr.io/tabmadi/microservices-monorepo-template/admin
    tag: "0000000000000000000000000000000000000000"   # bumped by promote-on-merge
