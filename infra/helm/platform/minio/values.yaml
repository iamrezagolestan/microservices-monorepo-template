minio:
  enabled: true   # umbrella gate (Chart.yaml condition); prod sets this false
  # Stable service name `minio` regardless of the Helm release name. Under ArgoCD
  # the release is `<env>-platform-minio`, so without this the Service would be
  # `<env>-platform-minio` and the loki/tempo/mimir endpoints (which target
  # `minio.platform.svc`) would not resolve.
  fullnameOverride: minio
  mode: standalone
  replicas: 1
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests: { memory: "256Mi" }
  rootUser: minio
  rootPassword: minio-password
  # One bucket per backend consumer (platform/observability charts), matching
  # the names each chart's own values.yaml expects.
  buckets:
    - { name: platform-backups,      policy: none, purge: false }
    - { name: loki-chunks,           policy: none, purge: false }
    - { name: loki-ruler,            policy: none, purge: false }
    - { name: loki-admin,            policy: none, purge: false }
    - { name: mimir-blocks,          policy: none, purge: false }
    - { name: mimir-ruler,           policy: none, purge: false }
    - { name: mimir-alertmanager,    policy: none, purge: false }
    - { name: tempo-traces,          policy: none, purge: false }
