cilium:
  # k3s runs its own API server on localhost:6443.
  kubeProxyReplacement: true
  k8sServiceHost: 127.0.0.1
  k8sServicePort: 6443

  ipam:
    mode: kubernetes

  # WireGuard transparent encryption for all east-west pod traffic (ADR-0003).
  # A config flag, not a sidecar: multi-tenant PII and audit posture do not ship
  # plaintext east-west. Node-to-node only; host-level traffic is out of scope.
  encryption:
    enabled: true
    type: wireguard

  # Hubble gives per-flow network visibility without a sidecar (ADR-0003). It is
  # the audit surface for internal header-trust (ADR-0009) and the source for the
  # network-flow metrics scraped into Grafana. The flow engine (agent) + relay
  # (aggregation API, used by the `hubble` CLI) stay ON.
  #
  # The standalone hubble-UI is intentionally DISABLED (ADR-0025): upstream
  # hubble-ui is in maintenance mode (last release v0.13.5, Apr 2024) and collapses
  # every workload sharing `app.kubernetes.io/name` into one card (all Temporal
  # roles → "temporal"). Coroot (infra/helm/platform/coroot, at coroot.ops.<host>)
  # replaces it and keys workloads by Deployment, so multi-role apps stay distinct.
  hubble:
    enabled: true
    relay:
      enabled: true
    ui:
      enabled: false
    # Flow metrics on the agent at :9965, scraped by the node-local OTel collector
    # and surfaced in Grafana (ADR-0011, ADR-0025).
    #
    # `drop` — Cilium policy verdicts, which Coroot structurally CANNOT see: it
    # observes connections that succeeded or failed, never "denied by policy". That
    # gap is why this metric exists, and this repo has been bitten by it — the
    # clusterwide metadata-deny regression, four default-deny bootstrap gaps, and a
    # catalog/payment netpol block that silently broke every checkout.
    #
    # `flow` — every processed flow with source/destination workload, i.e. the
    # eBPF-derived connection graph. Added for the Hubble service-map POC (ADR-0025):
    # unlike the Tempo service_graphs map it needs no tracing, so it shows EVERY
    # connection — including un-instrumented and idle services — which is the one part
    # of Coroot's map the trace-based map cannot reproduce. This is the prerequisite
    # for retiring Coroot. `tcp` and especially `http` (per-request L7 cardinality on
    # every agent) stay OFF — real cost for detail the RED/trace signals already give.
    #
    # workload context so series name the Deployment (temporal-frontend vs
    # temporal-history) rather than the shared app.kubernetes.io/name — the same
    # collapsing defect that retired the Hubble UI. It renders as a single combined
    # `source`/`destination` label of the form "<namespace>/<workload>", NOT as
    # separate source_workload/destination_workload labels — verified against a live
    # agent; the dashboard PromQL depends on this.
    #
    # `dns` was tried and REMOVED: Cilium only observes DNS at L7, so dns metrics
    # never register without a DNS visibility/L7 policy on every pod. That is real
    # scope and real cost for a signal Coroot already surfaces.
    metrics:
      enabled:
        - "drop:sourceContext=workload;destinationContext=workload"
        - "flow:sourceContext=workload;destinationContext=workload"
