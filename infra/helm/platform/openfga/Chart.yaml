apiVersion: v2
name: openfga
description: |
  OpenFGA authorization engine (ADR-0010), Postgres-backed. Deployed directly as
  a Deployment + Service with an `openfga migrate` initContainer — no operator or
  CRD. A seed Job creates the `platform` store, writes the model, and applies the
  ops-tier grants. See ADR-0010 for why we skip an operator.
type: application
version: 0.1.0
appVersion: "1.14.2"
